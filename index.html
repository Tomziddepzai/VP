<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO Cinematic Memory Planet</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <video id="input_video" style="display:none" playsinline></video>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        const videoElement = document.getElementById('input_video');

        // --- 1. SETUP CƠ BẢN ---
        const scene = new THREE.Scene();
        // Tạo sương mù (fog) để viền hành tinh chìm vào bóng tối tự nhiên
        scene.fog = new THREE.FogExp2(0x000000, 0.02);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 20;

        const renderer = new THREE.WebGLRenderer({ antialias: false }); // Tắt antialias để Bloom chạy mượt hơn
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- 2. POST-PROCESSING (Hiệu ứng phát sáng PRO) ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 1.8; // Độ chói của hào quang
        bloomPass.radius = 0.5;

        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // --- 3. TẠO TEXTURE HẠT CHUYÊN NGHIỆP ---
        const createGlowTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');      // Lõi trắng buốt
            gradient.addColorStop(0.2, 'rgba(255, 200, 100, 0.8)');  // Vàng cam rực
            gradient.addColorStop(0.5, 'rgba(255, 150, 50, 0.2)');   // Vàng tối
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');            // Tan vào nền
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        };
        const particleTexture = createGlowTexture();

        // --- 4. XÂY DỰNG HÀNH TINH (CỐ ĐỊNH TÂM) ---
        const planetGroup = new THREE.Group();
        scene.add(planetGroup);

        // Vật liệu chung cho hạt
        const pMaterial = new THREE.PointsMaterial({
            size: 0.15,
            map: particleTexture,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            color: 0xffddaa // Ánh vàng hoàng kim
        });

        // 4.1. Lớp Lõi (Core Sphere)
        const coreGeo = new THREE.BufferGeometry();
        const coreCount = 20000;
        const corePos = new Float32Array(coreCount * 3);
        for(let i=0; i<coreCount; i++) {
            const phi = Math.acos(-1 + (2 * i) / coreCount);
            const theta = Math.sqrt(coreCount * Math.PI) * phi;
            const r = 5 + (Math.random() * 0.2); // Bán kính 5, có độ gồ ghề nhẹ

            corePos[i*3] = r * Math.sin(phi) * Math.cos(theta);
            corePos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
            corePos[i*3+2] = r * Math.cos(phi);
        }
        coreGeo.setAttribute('position', new THREE.BufferAttribute(corePos, 3));
        const coreSphere = new THREE.Points(coreGeo, pMaterial);
        planetGroup.add(coreSphere);

        // 4.2. Lớp Vành Đai (Planetary Ring) - Đặc và sáng
        const ringGeo = new THREE.BufferGeometry();
        const ringCount = 15000;
        const ringPos = new Float32Array(ringCount * 3);
        for(let i=0; i<ringCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const r = 6.5 + Math.random() * 4; // Vành đai từ bán kính 6.5 đến 10.5
            
            ringPos[i*3] = Math.cos(angle) * r;
            ringPos[i*3+1] = (Math.random() - 0.5) * 0.2; // Độ dày của vành đai (rất dẹt)
            ringPos[i*3+2] = Math.sin(angle) * r;
        }
        ringGeo.setAttribute('position', new THREE.BufferAttribute(ringPos, 3));
        const ringMat = pMaterial.clone();
        ringMat.size = 0.08; // Hạt vành đai nhỏ và mịn hơn
        const ring = new THREE.Points(ringGeo, ringMat);
        
        // Nghiêng vành đai một góc cho nghệ thuật
        ring.rotation.x = Math.PI / 8;
        ring.rotation.y = Math.PI / 6;
        planetGroup.add(ring);

        // 4.3. Bụi Vũ Trụ (Ambient Dust) - Lơ lửng xung quanh
        const dustGeo = new THREE.BufferGeometry();
        const dustCount = 3000;
        const dustPos = new Float32Array(dustCount * 3);
        for(let i=0; i<dustCount*3; i++) {
            dustPos[i] = (Math.random() - 0.5) * 40;
        }
        dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
        const dustMat = pMaterial.clone();
        dustMat.size = 0.3; // Hạt to, out-of-focus
        dustMat.opacity = 0.4;
        const dust = new THREE.Points(dustGeo, dustMat);
        scene.add(dust);

        // --- 5. ĐIỀU KHIỂN BẰNG BÀN TAY (CỐ ĐỊNH HÀNH TINH) ---
        let targetRotationX = 0;
        let targetRotationY = 0;
        let targetZoom = 20;

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6 });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0];
                
                // Lấy tọa độ tâm bàn tay (ngón giữa - số 9) để Xoay hành tinh
                // Thay vì di chuyển hạt, ta gán góc xoay mục tiêu
                targetRotationY = (lm[9].x - 0.5) * Math.PI * 2; 
                targetRotationX = (lm[9].y - 0.5) * Math.PI;

                // Cử chỉ Zoom (Khoảng cách ngón cái 4 và ngón trỏ 8)
                const d = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);
                // Chụm = xa (30), Mở = gần (8)
                targetZoom = THREE.MathUtils.clamp(THREE.MathUtils.mapLinear(d, 0.05, 0.25, 30, 8), 8, 30);
            }
        });

        const cam = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        cam.start();

        // --- 6. VÒNG LẶP RENDER ---
        function animate() {
            requestAnimationFrame(animate);

            // Xoay tự động nhẹ nhàng
            planetGroup.rotation.y += 0.001;
            dust.rotation.y += 0.0005;
            dust.rotation.x += 0.0002;

            // Nước đi mượt mà (Lerp) theo bàn tay
            planetGroup.rotation.x = THREE.MathUtils.lerp(planetGroup.rotation.x, targetRotationX, 0.05);
            planetGroup.rotation.y = THREE.MathUtils.lerp(planetGroup.rotation.y, targetRotationY, 0.05);
            camera.position.z = THREE.MathUtils.lerp(camera.position.z, targetZoom, 0.05);

            // Dùng composer để có hiệu ứng phát sáng Bloom
            composer.render();
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
