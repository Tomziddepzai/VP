<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ Ký ức của chúng mình ✦</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; }
video  { display:none; }

#intro {
  position:fixed; inset:0; z-index:50;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  pointer-events:none;
}
#intro h1 {
  font-family:'Georgia',serif; font-weight:normal;
  font-size:clamp(20px,3.5vw,34px); letter-spacing:6px;
  color:rgba(255,235,160,0);
  animation:fadeIn 3s ease-out 0.8s forwards;
}
#intro p {
  margin-top:14px; font-family:'Georgia',serif;
  font-size:clamp(10px,1.6vw,13px); letter-spacing:4px;
  text-transform:uppercase; color:rgba(255,200,80,0);
  animation:fadeIn 3s ease-out 1.8s forwards;
}
@keyframes fadeIn { to { color:rgba(255,235,160,0.65); } }

#hud {
  position:fixed; bottom:26px; left:50%; transform:translateX(-50%);
  z-index:100; pointer-events:none;
  display:flex; align-items:center; gap:9px;
  border:0.5px solid rgba(255,220,80,0.18);
  border-radius:40px; padding:7px 20px;
  opacity:0; animation:fadeHud 1s ease-out 4.5s forwards;
}
@keyframes fadeHud { to { opacity:1; } }
#hud .dot {
  width:5px; height:5px; border-radius:50%;
  background:rgba(255,200,60,0.45);
  animation:blink 2.8s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:.15} 50%{opacity:.9} }
#hud span {
  font-family:'Georgia',serif; font-size:11px;
  letter-spacing:3px; color:rgba(255,210,100,0.45);
}
</style>
</head>
<body>

<video id="input_video" playsinline></video>

<div id="intro">
  <h1>✦ Ký ức của chúng mình ✦</h1>
  <p>Đưa tay · Nhíu ngón để khám phá</p>
</div>

<div id="hud">
  <div class="dot"></div>
  <span id="hud-txt">Đưa tay vào khung hình</span>
</div>

<!-- ══════════════════════════════
     ✦  THÊM ẢNH Ở ĐÂY
     Dán URL ImgBB vào url
     Tối đa 15 ảnh
════════════════════════════════ -->
<script>
const PHOTOS = [
  { url:'https://picsum.photos/seed/a1/600/450', name:'Lần đầu gặp nhau',     date:'14.02.2022' },
  { url:'https://picsum.photos/seed/b2/600/450', name:'Cà phê sáng hôm ấy',   date:'20.03.2022' },
  { url:'https://picsum.photos/seed/c3/600/450', name:'Sinh nhật em',           date:'05.07.2022' },
  { url:'https://picsum.photos/seed/d4/600/450', name:'Chuyến đi Đà Lạt',      date:'10.09.2022' },
  { url:'https://picsum.photos/seed/e5/600/450', name:'Mưa hôm ấy',             date:'03.11.2022' },
  { url:'https://picsum.photos/seed/f6/600/450', name:'Giáng sinh đầu tiên',    date:'25.12.2022' },
  { url:'https://picsum.photos/seed/g7/600/450', name:'Tết bên nhau',            date:'22.01.2023' },
  { url:'https://picsum.photos/seed/h8/600/450', name:'Buổi chiều ở biển',      date:'15.04.2023' },
];
</script>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ─────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────
const GLOBE_R     = 4.8;
const CORE_COUNT  = 20000;
const RING_COUNT  = 9000;
const RING_TILT   = 0.24;
const ZOOM_REVEAL = 9.5;   // dưới mức này ảnh bắt đầu hiện
const ZOOM_SHOW   = 7.5;   // dưới mức này ảnh hiện rõ hoàn toàn
const ZOOM_DEF    = 15.5;

// ─────────────────────────────────────────
// SCENE SETUP
// ─────────────────────────────────────────
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(52, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = ZOOM_DEF;

const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference:'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight),
  2.8,   // strength
  0.5,   // radius
  0.06   // threshold
);
composer.addPass(bloom);

// ─────────────────────────────────────────
// PARTICLE TEXTURE
// ─────────────────────────────────────────
function glowTex(size, r, g, b) {
  const cv = document.createElement('canvas');
  cv.width = cv.height = size;
  const ctx = cv.getContext('2d');
  const grd = ctx.createRadialGradient(size/2,size/2,0, size/2,size/2,size/2);
  grd.addColorStop(0,    `rgba(${r},${g},${b},1)`);
  grd.addColorStop(0.12, `rgba(${r},${g},${b},0.9)`);
  grd.addColorStop(0.4,  `rgba(${r},${g},${b},0.35)`);
  grd.addColorStop(0.7,  `rgba(${r},${g},${b},0.08)`);
  grd.addColorStop(1,    'rgba(0,0,0,0)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, size, size);
  return new THREE.CanvasTexture(cv);
}
const texCore = glowTex(64, 255, 245, 205);
const texRing = glowTex(32, 210, 225, 255);

// ─────────────────────────────────────────
// CORE PARTICLES
// ─────────────────────────────────────────
const geoCore  = new THREE.BufferGeometry();
const corePos  = new Float32Array(CORE_COUNT * 3);
const coreBase = new Float32Array(CORE_COUNT * 3);
const coreRnd  = new Float32Array(CORE_COUNT * 4);

for (let i = 0; i < CORE_COUNT; i++) {
  const phi   = Math.acos(-1 + (2*i)/CORE_COUNT);
  const theta = Math.sqrt(CORE_COUNT * Math.PI) * phi;
  const r     = GLOBE_R + Math.random() * 0.6;
  coreBase[i*3]   = r * Math.sin(phi)*Math.cos(theta);
  coreBase[i*3+1] = r * Math.sin(phi)*Math.sin(theta);
  coreBase[i*3+2] = r * Math.cos(phi);

  corePos[i*3]   = (Math.random()-.5)*22;
  corePos[i*3+1] = (Math.random()-.5)*22;
  corePos[i*3+2] = (Math.random()-.5)*22;

  coreRnd[i*4]   = Math.random()*0.25+0.07;
  coreRnd[i*4+1] = Math.random()*Math.PI*2;
  coreRnd[i*4+2] = Math.random()*Math.PI*2;
  coreRnd[i*4+3] = Math.random();
}
geoCore.setAttribute('position', new THREE.BufferAttribute(corePos, 3));
const pCore = new THREE.Points(geoCore, new THREE.PointsMaterial({
  size:0.14, map:texCore, transparent:true,
  blending:THREE.AdditiveBlending, depthWrite:false, color:0xfff5cc
}));
scene.add(pCore);

// ─────────────────────────────────────────
// RING PARTICLES
// ─────────────────────────────────────────
const geoRing  = new THREE.BufferGeometry();
const ringPos  = new Float32Array(RING_COUNT * 3);
const ringBase = new Float32Array(RING_COUNT * 3);
const ringRnd  = new Float32Array(RING_COUNT * 3);

for (let i = 0; i < RING_COUNT; i++) {
  const angle = Math.random()*Math.PI*2;
  const u = Math.random();
  const r = 6.8 + u*u*5.2;
  const px = Math.cos(angle)*r;
  const pz = Math.sin(angle)*r;
  const py = (Math.random()-.5)*0.07;
  ringBase[i*3]   = px;
  ringBase[i*3+1] = py - pz*Math.sin(RING_TILT)*0.14;
  ringBase[i*3+2] = pz*Math.cos(RING_TILT*0.14);

  ringPos[i*3]   = (Math.random()-.5)*24;
  ringPos[i*3+1] = (Math.random()-.5)*10;
  ringPos[i*3+2] = (Math.random()-.5)*24;
  ringRnd[i*3]   = Math.random()*0.17+0.04;
  ringRnd[i*3+1] = Math.random()*Math.PI*2;
  ringRnd[i*3+2] = Math.random();
}
geoRing.setAttribute('position', new THREE.BufferAttribute(ringPos, 3));
const pRing = new THREE.Points(geoRing, new THREE.PointsMaterial({
  size:0.08, map:texRing, transparent:true,
  blending:THREE.AdditiveBlending, depthWrite:false, color:0xddeeff
}));
scene.add(pRing);

// ─────────────────────────────────────────
// PHOTO CARDS — dán lên Group, xoay cùng địa cầu
// ─────────────────────────────────────────
// Group này xoay cùng pCore để ảnh "dính" trên cầu
const photoGroup = new THREE.Group();
scene.add(photoGroup);

const GOLDEN = Math.PI * (3 - Math.sqrt(5));

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function makeCard(photo, idx, total) {
  const W=300, H=225, PAD=14, FOOT=68;
  const cw = W+PAD*2, ch = H+PAD+FOOT;
  const cv = document.createElement('canvas');
  cv.width = cw; cv.height = ch;
  const ctx = cv.getContext('2d');

  // Nền card
  ctx.fillStyle = 'rgba(6,4,1,0.78)';
  roundRect(ctx,0,0,cw,ch,12); ctx.fill();
  ctx.strokeStyle = 'rgba(255,205,70,0.45)';
  ctx.lineWidth = 1;
  roundRect(ctx,0,0,cw,ch,12); ctx.stroke();

  // Placeholder màu nếu chưa load ảnh
  ctx.fillStyle = 'rgba(40,30,10,0.5)';
  roundRect(ctx,PAD,PAD,W,H,7); ctx.fill();

  // Tên
  ctx.fillStyle = 'rgba(255,235,175,0.92)';
  ctx.font = '17px Georgia';
  ctx.textAlign = 'center';
  ctx.fillText(photo.name||'', cw/2, H+PAD+30);

  // Ngày
  ctx.fillStyle = 'rgba(255,185,60,0.42)';
  ctx.font = '12px Georgia';
  ctx.fillText(photo.date||'', cw/2, H+PAD+52);

  const tex = new THREE.CanvasTexture(cv);

  // Tạo sprite dùng tex placeholder trước
  const mat = new THREE.SpriteMaterial({
    map: tex, transparent: true, opacity: 0,
    blending: THREE.NormalBlending, depthWrite: false,
    sizeAttenuation: true
  });
  const sp = new THREE.Sprite(mat);
  const sc = 3.0;
  sp.scale.set(sc * cw/H, sc, 1);

  // Vị trí cố định trên mặt cầu
  const phi_s   = Math.acos(1 - 2*(idx+0.5)/total);
  const theta_s = GOLDEN * idx;
  const rr      = GLOBE_R + 0.5;
  sp.position.set(
    rr * Math.sin(phi_s)*Math.cos(theta_s),
    rr * Math.sin(phi_s)*Math.sin(theta_s),
    rr * Math.cos(phi_s)
  );
  sp.userData = { phase: Math.random()*Math.PI*2 };
  photoGroup.add(sp);

  // Load ảnh thật, vẽ lại canvas
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    ctx.save();
    roundRect(ctx, PAD, PAD, W, H, 7);
    ctx.clip();
    ctx.drawImage(img, PAD, PAD, W, H);
    ctx.restore();
    // Vẽ lại text lên trên ảnh (vì bị clip đè)
    ctx.fillStyle = 'rgba(255,235,175,0.92)';
    ctx.font = '17px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText(photo.name||'', cw/2, H+PAD+30);
    ctx.fillStyle = 'rgba(255,185,60,0.42)';
    ctx.font = '12px Georgia';
    ctx.fillText(photo.date||'', cw/2, H+PAD+52);
    tex.needsUpdate = true;
  };
  img.onerror = () => {}; // giữ placeholder
  img.src = photo.url;

  return sp;
}

const sprites = PHOTOS.map((p,i) => makeCard(p, i, PHOTOS.length));

// ─────────────────────────────────────────
// HAND TRACKING
// ─────────────────────────────────────────
const videoEl = document.getElementById('input_video');
let rotX=0, rotY=0, zoom=ZOOM_DEF, isHand=false;

const handsMP = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
handsMP.setOptions({ maxNumHands:1, modelComplexity:1, minDetectionConfidence:0.6 });
handsMP.onResults(res => {
  const txt = document.getElementById('hud-txt');
  if (res.multiHandLandmarks?.length > 0) {
    isHand = true;
    const lm = res.multiHandLandmarks[0];
    rotY = (lm[9].x - 0.5) * Math.PI * 1.4;
    rotX = (lm[9].y - 0.5) * Math.PI * 0.85;
    const d = Math.hypot(lm[4].x-lm[8].x, lm[4].y-lm[8].y);
    // Zoom tối đa 7.0 — đủ thấy ảnh, không bị quá sâu
    zoom = THREE.MathUtils.clamp(
      THREE.MathUtils.mapLinear(d, 0.05, 0.26, 17, 7.0), 7.0, 17
    );
    txt.textContent = zoom < ZOOM_REVEAL ? '✦ Xoay tay để khám phá' : 'Nhíu ngón tay để zoom vào';
  } else {
    isHand = false;
    rotX *= 0.96; rotY *= 0.96;
    zoom = THREE.MathUtils.lerp(zoom, ZOOM_DEF, 0.03);
    txt.textContent = 'Đưa tay vào khung hình';
  }
});

new Camera(videoEl, {
  onFrame: async () => await handsMP.send({ image: videoEl }),
  width:640, height:480
}).start();

// scroll fallback
window.addEventListener('wheel', e => {
  zoom = THREE.MathUtils.clamp(zoom + e.deltaY * 0.012, 7.0, 20);
}, { passive:true });

// ─────────────────────────────────────────
// OSCILLATION helper
// ─────────────────────────────────────────
function osc(i, t, amp) {
  return Math.sin(t*1.1  + i*0.00831)*amp
       + Math.cos(t*0.73 + i*0.01543)*amp*0.45;
}

// ─────────────────────────────────────────
// ANIMATION LOOP
// ─────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  const t        = Date.now() * 0.00040;
  const revealed = isHand && zoom < ZOOM_REVEAL;

  // ── Core particles ──
  const cp = pCore.geometry.attributes.position.array;
  for (let i = 0; i < CORE_COUNT; i++) {
    const spd=coreRnd[i*4], o1=coreRnd[i*4+1], o2=coreRnd[i*4+2];
    let tx, ty, tz;
    if (isHand) {
      const b = osc(i, t, 0.065);
      tx = coreBase[i*3]  +b;   ty = coreBase[i*3+1]+b*0.7;  tz = coreBase[i*3+2]+b;
    } else {
      const r = 10 + Math.sin(t*spd*0.38+o2)*3.2;
      tx = Math.sin(t*spd      +o1     )*r;
      ty = Math.cos(t*spd*0.58 +o2     )*r*0.68;
      tz = Math.sin(t*spd*0.82 +o1+1.3 )*r;
    }
    const ls = isHand ? 0.020 : 0.015;
    cp[i*3]  +=(tx-cp[i*3]  )*ls;
    cp[i*3+1]+=(ty-cp[i*3+1])*ls;
    cp[i*3+2]+=(tz-cp[i*3+2])*ls;
  }
  pCore.geometry.attributes.position.needsUpdate = true;

  // ── Ring particles ──
  const rp = pRing.geometry.attributes.position.array;
  for (let i = 0; i < RING_COUNT; i++) {
    const spd=ringRnd[i*3], o1=ringRnd[i*3+1];
    let tx, ty, tz;
    if (isHand) {
      const b = osc(i+40000, t, 0.03);
      tx = ringBase[i*3]+b;  ty = ringBase[i*3+1]+b*0.2;  tz = ringBase[i*3+2]+b;
    } else {
      const r2 = 12+Math.sin(t*spd*0.28+o1)*3.8;
      tx = Math.cos(t*spd*0.48+o1    )*r2;
      ty = Math.sin(t*spd*0.33+o1+0.8)*r2*0.28;
      tz = Math.sin(t*spd*0.62+o1    )*r2;
    }
    const lr = isHand ? 0.016 : 0.012;
    rp[i*3]  +=(tx-rp[i*3]  )*lr;
    rp[i*3+1]+=(ty-rp[i*3+1])*lr;
    rp[i*3+2]+=(tz-rp[i*3+2])*lr;
  }
  pRing.geometry.attributes.position.needsUpdate = true;

  // ── Rotation — pCore, pRing, photoGroup xoay CÙNG NHAU ──
  const tRX = isHand ? rotX : 0;
  const tRY = isHand ? rotY : 0;

  // Lerp rotation
  const nextRX = THREE.MathUtils.lerp(pCore.rotation.x, tRX,         0.04);
  const nextRY = THREE.MathUtils.lerp(pCore.rotation.y, tRY + pCore.rotation.y * 0, 0.04);

  pCore.rotation.x = nextRX;
  pCore.rotation.y = THREE.MathUtils.lerp(pCore.rotation.y, tRY, 0.04);
  pCore.rotation.y += 0.00085; // tự xoay

  // Vành đai xoay cùng nhưng thêm tilt
  pRing.rotation.x = THREE.MathUtils.lerp(pRing.rotation.x, tRX+RING_TILT, 0.04);
  pRing.rotation.y = THREE.MathUtils.lerp(pRing.rotation.y, tRY, 0.04);
  pRing.rotation.y += 0.00055;

  // photoGroup xoay chính xác như pCore — ảnh dính trên cầu
  photoGroup.rotation.x = pCore.rotation.x;
  photoGroup.rotation.y = pCore.rotation.y;

  // ── Camera zoom ──
  camera.position.z = THREE.MathUtils.lerp(camera.position.z, zoom, 0.05);

  // ── Sprites opacity: fade theo zoom ──
  // Dùng smoothstep để fade mượt trong khoảng ZOOM_REVEAL → ZOOM_SHOW
  const zoomFactor = THREE.MathUtils.clamp(
    THREE.MathUtils.mapLinear(zoom, ZOOM_REVEAL, ZOOM_SHOW, 0, 1), 0, 1
  );
  // Chỉ hiện khi có tay
  const baseOp = isHand ? zoomFactor * zoomFactor * (3 - 2*zoomFactor) : 0; // smoothstep

  sprites.forEach((sp, i) => {
    if (!sp) return;
    // Shimmer nhẹ khi hiện
    const shimmer = baseOp > 0.05
      ? Math.sin(t*0.9 + sp.userData.phase)*0.06
      : 0;
    const targetOp = THREE.MathUtils.clamp(baseOp + shimmer, 0, 1);
    sp.material.opacity = THREE.MathUtils.lerp(sp.material.opacity, targetOp, 0.04);
    sp.material.needsUpdate = true;
  });

  // ── Bloom: giảm hẳn khi zoom vào để ảnh không bị chói ──
  const targetBloom = THREE.MathUtils.mapLinear(
    THREE.MathUtils.clamp(zoom, ZOOM_SHOW, ZOOM_DEF),
    ZOOM_SHOW, ZOOM_DEF,
    0.6,   // zoom vào: bloom rất nhẹ, ảnh rõ
    2.8    // zoom xa: bloom rực
  );
  bloom.strength = THREE.MathUtils.lerp(bloom.strength, targetBloom, 0.04);

  // ── Fade intro khi có tay ──
  if (isHand) {
    const intro = document.getElementById('intro');
    if (intro) intro.style.opacity = '0';
  }

  composer.render();
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
  bloom.resolution.set(innerWidth, innerHeight);
});
</script>
</body>
</html>
