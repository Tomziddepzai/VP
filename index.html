<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Hoàng Kim - Final Cinematic</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; cursor: none; }
        canvas { display: block; }
    </style>
</head>
<body>
    <video id="input_video" style="display:none" playsinline></video>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        const videoElement = document.getElementById('input_video');

        // --- 1. SETUP VŨ TRỤ ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        // Luôn để camera ở góc nghiêng nhẹ từ trên xuống để tạo chiều sâu
        camera.position.set(0, 5, 12); 
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        // Bloom ngả trắng rực rỡ
        const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 3.5, 0.4, 0.1);
        composer.addPass(bloom);

        const texture = (() => {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const g = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            g.addColorStop(0, 'rgba(255, 255, 255, 1)');      // Trắng rực
            g.addColorStop(0.2, 'rgba(255, 250, 200, 1)');    // Vàng kem nhạt
            g.addColorStop(0.5, 'rgba(218, 165, 32, 0.3)');   // Vàng đồng mờ
            g.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = g; ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        })();

        // --- 2. HỆ THỐNG HẠT ---
        const pCount = 30000;
        const geo = new THREE.BufferGeometry();
        const positions = new Float32Array(pCount * 3);
        const basePos = new Float32Array(pCount * 3);
        const idlePos = new Float32Array(pCount * 3);
        const randoms = new Float32Array(pCount);

        for (let i = 0; i < pCount; i++) {
            let x, y, z;
            if (i < 15000) { // Quả cầu tâm
                const phi = Math.acos(-1 + (2 * i) / 15000);
                const theta = Math.sqrt(15000 * Math.PI) * phi;
                x = 5 * Math.sin(phi) * Math.cos(theta);
                y = 5 * Math.sin(phi) * Math.sin(theta);
                z = 5 * Math.cos(phi);
            } else { // Vành đai phẳng và mỏng
                const angle = Math.random() * Math.PI * 2;
                const r = 7.5 + Math.random() * 4;
                x = Math.cos(angle) * r;
                y = (Math.random() - 0.5) * 0.1;
                z = Math.sin(angle) * r;
            }
            basePos[i*3] = x; basePos[i*3+1] = y; basePos[i*3+2] = z;

            // Vị trí lúc rảnh: Gần màn hình hơn, bay lơ lửng
            idlePos[i*3] = (Math.random() - 0.5) * 30;
            idlePos[i*3+1] = (Math.random() - 0.5) * 25;
            idlePos[i*3+2] = (Math.random() - 0.5) * 15 + 5; // Đẩy về phía camera

            positions[i*3] = idlePos[i*3];
            positions[i*3+1] = idlePos[i*3+1];
            positions[i*3+2] = idlePos[i*3+2];
            randoms[i] = Math.random() * 0.3 + 0.05; // Tốc độ cực chậm
        }

        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const mat = new THREE.PointsMaterial({
            size: 0.13, map: texture, transparent: true,
            blending: THREE.AdditiveBlending, depthWrite: false, color: 0xfffcf0
        });
        const particles = new THREE.Points(geo, mat);
        
        // KHÓA GÓC NGHIÊNG MẶC ĐỊNH
        particles.rotation.x = 0.4; 
        particles.rotation.z = 0.2;
        scene.add(particles);

        // --- 3. NHẬN DIỆN TAY (TỐI ƯU) ---
        let isHand = false;
        let handX = 0, handY = 0, zoom = 12;

        const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5 }); // Giảm complexity để nhạy hơn

        hands.onResults((res) => {
            if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
                isHand = true;
                const lm = res.multiHandLandmarks[0][9]; // Lấy lòng bàn tay
                handX = (lm.x - 0.5) * 2;
                handY = (lm.y - 0.5) * 2;
                
                const thumb = res.multiHandLandmarks[0][4];
                const index = res.multiHandLandmarks[0][8];
                const d = Math.hypot(thumb.x - index.x, thumb.y - index.y);
                zoom = THREE.MathUtils.clamp(THREE.MathUtils.mapLinear(d, 0.05, 0.25, 15, 6), 6, 15);
            } else {
                isHand = false;
                zoom = 12;
            }
        });

        const camS = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 480, height: 360 // Giảm độ phân giải cam để tăng tốc nhận diện
        });
        camS.start();

        // --- 4. ANIMATION ---
        function animate() {
            requestAnimationFrame(animate);
            const t = Date.now() * 0.0002; // Tốc độ trôi cực chậm (Êm ái)
            const pos = particles.geometry.attributes.position.array;

            for (let i = 0; i < pCount; i++) {
                let tx, ty, tz;
                const s = randoms[i];

                if (isHand) {
                    // CÓ TAY: Hội tụ nhanh và chính xác
                    tx = basePos[i*3];
                    ty = basePos[i*3+1];
                    tz = basePos[i*3+2];
                } else {
                    // KHÔNG TAY: Bay chậm rãi, uyển chuyển (Mượt mà)
                    tx = idlePos[i*3] + Math.sin(t * 10 * s) * 2;
                    ty = idlePos[i*3+1] + Math.cos(t * 8 * s) * 2;
                    tz = idlePos[i*3+2] + Math.sin(t * 5 * s) * 2;
                }

                const lerpSpeed = isHand ? 0.08 : 0.015; // Trôi ra cực chậm để không bị "dại"
                pos[i*3] += (tx - pos[i*3]) * lerpSpeed;
                pos[i*3+1] += (ty - pos[i*3+1]) * lerpSpeed;
                pos[i*3+2] += (tz - pos[i*3+2]) * lerpSpeed;
            }

            particles.geometry.attributes.position.needsUpdate = true;

            // Xoay tương tác nhẹ nhàng khi có tay
            if (isHand) {
                particles.rotation.y = THREE.MathUtils.lerp(particles.rotation.y, handX * 0.5, 0.05);
                particles.rotation.x = THREE.MathUtils.lerp(particles.rotation.x, 0.4 + handY * 0.3, 0.05);
            } else {
                particles.rotation.y += 0.001; // Tự xoay chậm khi rảnh
                particles.rotation.x = THREE.MathUtils.lerp(particles.rotation.x, 0.4, 0.02);
            }
            
            camera.position.z = THREE.MathUtils.lerp(camera.position.z, zoom, 0.05);
            composer.render();
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
