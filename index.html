<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Planet ✦</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #000; overflow: hidden; font-family: 'Georgia', serif; cursor: none; }
canvas { display: block; }
video { display: none; }

/* ── HUD ── */
#hud {
position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
display: flex; gap: 10px; align-items: center;
background: rgba(255,255,255,0.04);
border: 0.5px solid rgba(255,220,100,0.25);
border-radius: 40px; padding: 8px 20px;
backdrop-filter: blur(8px);
transition: opacity 0.6s;
z-index: 100;
}
#hud span {
font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
color: rgba(255,220,100,0.55);
}
#hud .dot {
width: 6px; height: 6px; border-radius: 50%;
background: rgba(255,200,60,0.4);
animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

/* ── ADMIN PANEL ── */
#admin-btn {
position: fixed; top: 16px; right: 16px; z-index: 200;
background: rgba(255,255,255,0.06);
border: 0.5px solid rgba(255,220,100,0.3);
color: rgba(255,220,100,0.7);
font-size: 11px; letter-spacing: 2px;
padding: 7px 14px; border-radius: 20px;
cursor: pointer; transition: all 0.3s;
}
#admin-btn:hover { background: rgba(255,220,100,0.12); }

#admin-panel {
position: fixed; top: 0; right: 0; bottom: 0; width: 340px;
background: rgba(8,6,2,0.96);
border-left: 0.5px solid rgba(255,220,100,0.2);
z-index: 300; transform: translateX(100%);
transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
overflow-y: auto; padding: 24px;
}
#admin-panel.open { transform: translateX(0); }
#admin-panel h2 {
font-size: 13px; letter-spacing: 3px; color: rgba(255,220,100,0.8);
text-transform: uppercase; margin-bottom: 20px;
padding-bottom: 12px; border-bottom: 0.5px solid rgba(255,220,100,0.15);
}
#admin-panel label {
display: block; font-size: 10px; letter-spacing: 2px;
color: rgba(255,220,100,0.45); margin-bottom: 5px; margin-top: 14px;
}
#admin-panel input, #admin-panel textarea {
width: 100%; background: rgba(255,255,255,0.04);
border: 0.5px solid rgba(255,220,100,0.2);
color: rgba(255,240,200,0.9); font-size: 12px;
padding: 8px 10px; border-radius: 8px; outline: none;
font-family: inherit;
}
#admin-panel textarea { height: 60px; resize: vertical; }
#admin-panel input:focus, #admin-panel textarea:focus {
border-color: rgba(255,220,100,0.5);
}
.admin-photo-item {
background: rgba(255,255,255,0.03);
border: 0.5px solid rgba(255,220,100,0.15);
border-radius: 10px; padding: 10px 12px; margin-bottom: 8px;
display: flex; align-items: center; gap: 10px;
}
.admin-photo-item img {
width: 44px; height: 44px; object-fit: cover;
border-radius: 6px; border: 0.5px solid rgba(255,220,100,0.2);
}
.admin-photo-item .info { flex: 1; min-width: 0; }
.admin-photo-item .info p {
font-size: 11px; color: rgba(255,240,200,0.8);
white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.admin-photo-item .info span {
font-size: 10px; color: rgba(255,200,80,0.45);
}
.admin-photo-item .del {
color: rgba(255,80,80,0.5); cursor: pointer; font-size: 16px;
line-height: 1; background: none; border: none;
transition: color 0.2s;
}
.admin-photo-item .del:hover { color: rgba(255,80,80,0.9); }
.btn-primary {
width: 100%; margin-top: 12px;
background: rgba(255,200,60,0.12);
border: 0.5px solid rgba(255,200,60,0.4);
color: rgba(255,220,100,0.9); font-size: 11px;
letter-spacing: 2px; text-transform: uppercase;
padding: 10px; border-radius: 10px; cursor: pointer;
transition: all 0.3s;
}
.btn-primary:hover { background: rgba(255,200,60,0.22); }
.btn-danger {
width: 100%; margin-top: 6px;
background: transparent;
border: 0.5px solid rgba(255,80,80,0.3);
color: rgba(255,100,100,0.6); font-size: 10px;
letter-spacing: 1px; text-transform: uppercase;
padding: 7px; border-radius: 8px; cursor: pointer;
transition: all 0.3s;
}
.btn-danger:hover { border-color: rgba(255,80,80,0.6); color: rgba(255,100,100,0.9); }
#admin-close {
position: absolute; top: 16px; right: 16px;
background: none; border: none; color: rgba(255,220,100,0.5);
font-size: 20px; cursor: pointer; line-height: 1;
}

/* ── PHOTO VIEWER ── */
#photo-viewer {
position: fixed; inset: 0; z-index: 400;
background: rgba(0,0,0,0); display: flex;
align-items: center; justify-content: center;
opacity: 0; pointer-events: none;
transition: all 0.5s cubic-bezier(0.16,1,0.3,1);
}
#photo-viewer.open {
background: rgba(0,0,0,0.88); opacity: 1; pointer-events: all;
}
#photo-viewer .frame {
position: relative; max-width: 520px; width: 90%;
transform: scale(0.9);
transition: transform 0.5s cubic-bezier(0.16,1,0.3,1);
}
#photo-viewer.open .frame { transform: scale(1); }
#photo-viewer img {
width: 100%; border-radius: 16px;
border: 1px solid rgba(255,220,100,0.25);
box-shadow: 0 0 80px rgba(255,180,40,0.12);
}
#photo-viewer .caption {
text-align: center; margin-top: 16px;
}
#photo-viewer .caption h3 {
font-size: 18px; color: rgba(255,240,200,0.95);
font-weight: normal; letter-spacing: 1px;
}
#photo-viewer .caption p {
font-size: 12px; color: rgba(255,200,80,0.55);
letter-spacing: 2px; margin-top: 4px; text-transform: uppercase;
}
#photo-viewer .close-viewer {
position: absolute; top: -16px; right: -16px;
width: 36px; height: 36px; border-radius: 50%;
background: rgba(255,255,255,0.08);
border: 0.5px solid rgba(255,220,100,0.3);
color: rgba(255,220,100,0.8); font-size: 18px;
cursor: pointer; display: flex; align-items: center;
justify-content: center; transition: all 0.2s;
}
#photo-viewer .close-viewer:hover { background: rgba(255,220,100,0.15); }
#photo-viewer .nav-btn {
position: absolute; top: 50%; transform: translateY(-50%);
background: rgba(255,255,255,0.06);
border: 0.5px solid rgba(255,220,100,0.2);
color: rgba(255,220,100,0.7); font-size: 20px;
width: 40px; height: 40px; border-radius: 50%;
cursor: pointer; display: flex; align-items: center;
justify-content: center; transition: all 0.2s;
}
#photo-viewer .nav-btn:hover { background: rgba(255,220,100,0.12); }
#photo-viewer .nav-prev { left: -56px; }
#photo-viewer .nav-next { right: -56px; }

/* ── ZOOM INDICATOR ── */
#zoom-hint {
position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
text-align: center; pointer-events: none; z-index: 50;
opacity: 0; transition: opacity 1s;
}
#zoom-hint p {
font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
color: rgba(255,200,80,0.5);
}

/* ── STATUS ── */
#status {
position: fixed; top: 16px; left: 16px; z-index: 100;
font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
color: rgba(100,255,180,0.6); pointer-events: none;
}
</style>

</head>

<!-- ADMIN -->

  <h2>Ký ức hành tinh</h2>

<!-- THREE.JS -->

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ─────────────────────────────────────────
// GLOBALS
// ─────────────────────────────────────────
const RING_TILT = 0.22;
const GLOBE_R   = 4.5;
const ZOOM_REVEAL = 9.5; // ngưỡng zoom để hiện ảnh

window._photos = []; // {url, name, date, sprite, angle, phi}
window._currentViewerIdx = 0;
window._zoomLevel = 16;
window._isHand = false;

// ─────────────────────────────────────────
// SCENE
// ─────────────────────────────────────────
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 16;

const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference:'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x000000, 1);
document.body.appendChild(renderer.domElement);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 2.8, 0.55, 0.06);
composer.addPass(bloom);

// ─────────────────────────────────────────
// TEXTURES
// ─────────────────────────────────────────
function makeGlowTex(size, r, g, b) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const grd = ctx.createRadialGradient(size/2,size/2,0, size/2,size/2,size/2);
  grd.addColorStop(0,   `rgba(${r},${g},${b},1)`);
  grd.addColorStop(0.15,`rgba(${r},${g},${b},0.95)`);
  grd.addColorStop(0.4, `rgba(${r},${g},${b},0.4)`);
  grd.addColorStop(0.7, `rgba(${r},${g},${b},0.1)`);
  grd.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = grd; ctx.fillRect(0,0,size,size);
  return new THREE.CanvasTexture(c);
}
const texCore = makeGlowTex(64, 255, 248, 220);
const texRing = makeGlowTex(32, 220, 230, 255);

// ─────────────────────────────────────────
// PARTICLES — core
// ─────────────────────────────────────────
let coreCount = 18000;
let particlesCore, geoCore, coreBase, coreRand, corePosArr;

function buildCore(count) {
  if (particlesCore) { scene.remove(particlesCore); geoCore.dispose(); }
  coreCount = count;
  geoCore    = new THREE.BufferGeometry();
  corePosArr = new Float32Array(count * 3);
  coreBase   = new Float32Array(count * 3);
  coreRand   = new Float32Array(count * 4);

  for (let i = 0; i < count; i++) {
    const phi   = Math.acos(-1 + (2*i)/count);
    const theta = Math.sqrt(count * Math.PI) * phi;
    const r     = GLOBE_R + Math.random() * 0.7;
    coreBase[i*3]   = r * Math.sin(phi)*Math.cos(theta);
    coreBase[i*3+1] = r * Math.sin(phi)*Math.sin(theta);
    coreBase[i*3+2] = r * Math.cos(phi);

    const sp = 18;
    corePosArr[i*3]   = (Math.random()-.5)*sp;
    corePosArr[i*3+1] = (Math.random()-.5)*sp;
    corePosArr[i*3+2] = (Math.random()-.5)*sp;

    coreRand[i*4]   = Math.random()*0.28+0.08;
    coreRand[i*4+1] = Math.random()*Math.PI*2;
    coreRand[i*4+2] = Math.random()*Math.PI*2;
    coreRand[i*4+3] = Math.random();
  }
  geoCore.setAttribute('position', new THREE.BufferAttribute(corePosArr,3));
  const mat = new THREE.PointsMaterial({
    size:0.15, map:texCore, transparent:true,
    blending:THREE.AdditiveBlending, depthWrite:false, color:0xfff8dc
  });
  particlesCore = new THREE.Points(geoCore, mat);
  scene.add(particlesCore);
}
buildCore(coreCount);

// ─────────────────────────────────────────
// PARTICLES — ring
// ─────────────────────────────────────────
const ringCount = 10000;
const geoRing   = new THREE.BufferGeometry();
const ringPos   = new Float32Array(ringCount*3);
const ringBase  = new Float32Array(ringCount*3);
const ringRand  = new Float32Array(ringCount*3);

for (let i = 0; i < ringCount; i++) {
  const angle = Math.random()*Math.PI*2;
  const u = Math.random();
  const r = 6.5 + u*u*5.0;
  const px = Math.cos(angle)*r;
  const pz = Math.sin(angle)*r;
  const py = (Math.random()-.5)*0.07;
  ringBase[i*3]   = px;
  ringBase[i*3+1] = py - pz*Math.sin(RING_TILT)*0.15;
  ringBase[i*3+2] = pz*Math.cos(RING_TILT*0.15);

  const s = 22;
  ringPos[i*3]   = (Math.random()-.5)*s;
  ringPos[i*3+1] = (Math.random()-.5)*s*0.4;
  ringPos[i*3+2] = (Math.random()-.5)*s;
  ringRand[i*3]   = Math.random()*0.18+0.05;
  ringRand[i*3+1] = Math.random()*Math.PI*2;
  ringRand[i*3+2] = Math.random();
}
geoRing.setAttribute('position', new THREE.BufferAttribute(ringPos,3));
const matRing = new THREE.PointsMaterial({
  size:0.09, map:texRing, transparent:true,
  blending:THREE.AdditiveBlending, depthWrite:false, color:0xe8f0ff
});
const particlesRing = new THREE.Points(geoRing, matRing);
scene.add(particlesRing);

// ─────────────────────────────────────────
// PHOTO SPRITES
// ─────────────────────────────────────────
function createPhotoSprite(url, idx) {
  const total  = window._photos.length;
  // Phân bố đều trên cầu bằng Fibonacci
  const goldenAngle = Math.PI * (3 - Math.sqrt(5));
  const phi   = Math.acos(1 - 2*(idx+0.5)/Math.max(total,1));
  const theta = goldenAngle * idx;

  const sx = (GLOBE_R+0.3) * Math.sin(phi)*Math.cos(theta);
  const sy = (GLOBE_R+0.3) * Math.sin(phi)*Math.sin(theta);
  const sz = (GLOBE_R+0.3) * Math.cos(phi);

  // Load ảnh → canvas → sprite
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    const W = 256, H = 192;
    const cv = document.createElement('canvas');
    cv.width = W+20; cv.height = H+60;
    const ctx = cv.getContext('2d');

    // Frame vàng
    ctx.save();
    ctx.shadowColor = 'rgba(255,200,60,0.6)';
    ctx.shadowBlur  = 12;
    ctx.fillStyle   = 'rgba(255,220,80,0.18)';
    ctx.strokeStyle = 'rgba(255,210,80,0.7)';
    ctx.lineWidth   = 1.5;
    roundRect(ctx, 10, 10, W, H, 10);
    ctx.fill(); ctx.stroke();
    ctx.restore();

    // Ảnh
    ctx.save();
    ctx.beginPath();
    roundRect(ctx, 10, 10, W, H, 10);
    ctx.clip();
    ctx.drawImage(img, 10, 10, W, H);
    ctx.restore();

    // Caption
    const p = window._photos[idx];
    if (p) {
      ctx.fillStyle = 'rgba(255,235,170,0.92)';
      ctx.font = 'bold 18px Georgia';
      ctx.textAlign = 'center';
      ctx.fillText(p.name || '', (W+20)/2, H+32);
      ctx.fillStyle = 'rgba(255,200,80,0.55)';
      ctx.font = '13px Georgia';
      ctx.fillText(p.date || '', (W+20)/2, H+52);
    }

    const tex = new THREE.CanvasTexture(cv);
    const mat = new THREE.SpriteMaterial({
      map: tex, transparent: true, opacity: 0,
      blending: THREE.NormalBlending, depthWrite: false
    });
    const sprite = new THREE.Sprite(mat);
    const scale = 2.4;
    sprite.scale.set(scale * (W+20)/H, scale, 1);
    sprite.position.set(sx, sy, sz);
    sprite.userData = { idx, targetOpacity: 0, basePos: new THREE.Vector3(sx,sy,sz) };
    scene.add(sprite);
    window._photos[idx].sprite = sprite;
  };
  img.onerror = () => {
    // Placeholder nếu ảnh lỗi
    const cv = document.createElement('canvas');
    cv.width = 276; cv.height = 252;
    const ctx = cv.getContext('2d');
    ctx.fillStyle = 'rgba(255,200,60,0.1)';
    ctx.strokeStyle = 'rgba(255,200,60,0.4)';
    ctx.lineWidth = 1;
    ctx.fillRect(0,0,276,252); ctx.strokeRect(0,0,276,252);
    ctx.fillStyle = 'rgba(255,200,80,0.6)';
    ctx.font = '14px Georgia'; ctx.textAlign='center';
    ctx.fillText('Ảnh không tải được', 138, 126);
    const tex = new THREE.CanvasTexture(cv);
    const mat = new THREE.SpriteMaterial({ map:tex, transparent:true, opacity:0 });
    const sprite = new THREE.Sprite(mat);
    sprite.scale.set(2.4,1.8,1);
    sprite.position.set(sx,sy,sz);
    sprite.userData = { idx, targetOpacity:0, basePos:new THREE.Vector3(sx,sy,sz) };
    scene.add(sprite);
    window._photos[idx].sprite = sprite;
  };
  img.src = url;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// Rebuild sprites sau khi cập nhật danh sách
window.rebuildSprites = function() {
  // Xóa sprite cũ
  window._photos.forEach(p => {
    if (p.sprite) { scene.remove(p.sprite); p.sprite = null; }
  });
  window._photos.forEach((p, i) => createPhotoSprite(p.url, i));
  document.getElementById('photo-count').textContent = window._photos.length;
  renderPhotoList();
};

// ─────────────────────────────────────────
// HAND TRACKING
// ─────────────────────────────────────────
const videoEl = document.getElementById('input_video');
let rotX=0, rotY=0, zoom=16, isHand=false;

const handsDetect = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});
handsDetect.setOptions({ maxNumHands:1, modelComplexity:1, minDetectionConfidence:0.6 });
handsDetect.onResults(res => {
  if (res.multiHandLandmarks?.length > 0) {
    isHand = true; window._isHand = true;
    const lm = res.multiHandLandmarks[0];
    rotY = (lm[9].x - 0.5) * Math.PI * 1.4;
    rotX = (lm[9].y - 0.5) * Math.PI * 0.9;
    const d = Math.hypot(lm[4].x-lm[8].x, lm[4].y-lm[8].y);
    zoom = THREE.MathUtils.clamp(
      THREE.MathUtils.mapLinear(d, 0.04, 0.28, 18, 5), 5, 18
    );
    document.getElementById('hud-text').textContent =
      zoom < ZOOM_REVEAL ? 'Khám phá ký ức ✦' : 'Nhíu ngón tay để zoom vào';
  } else {
    isHand = false; window._isHand = false;
    rotX *= 0.96; rotY *= 0.96;
    zoom = THREE.MathUtils.lerp(zoom, 16, 0.035);
    document.getElementById('hud-text').textContent = 'Đưa tay vào khung hình';
  }
  window._zoomLevel = zoom;
});

const camStream = new Camera(videoEl, {
  onFrame: async () => { await handsDetect.send({ image: videoEl }); },
  width: 640, height: 480
});
camStream.start().then(() => {
  document.getElementById('status').textContent = 'Camera sẵn sàng';
  setTimeout(()=>{ document.getElementById('status').style.opacity='0'; }, 3000);
}).catch(() => {
  document.getElementById('status').textContent = 'Không có camera — dùng scroll để zoom';
  document.getElementById('status').style.color = 'rgba(255,160,60,0.7)';
});

// Scroll fallback (không có tay)
window.addEventListener('wheel', e => {
  zoom = THREE.MathUtils.clamp(zoom + e.deltaY * 0.01, 5, 20);
  window._zoomLevel = zoom;
}, { passive:true });

// ─────────────────────────────────────────
// RAYCASTER — click ảnh
// ─────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
renderer.domElement.addEventListener('click', e => {
  if (document.getElementById('photo-viewer').classList.contains('open')) return;
  mouse.x =  (e.clientX / innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const sprites = window._photos.map(p=>p.sprite).filter(Boolean);
  const hits = raycaster.intersectObjects(sprites);
  if (hits.length > 0 && window._zoomLevel < ZOOM_REVEAL) {
    const idx = hits[0].object.userData.idx;
    openViewer(idx);
  }
});

// ─────────────────────────────────────────
// ANIMATION
// ─────────────────────────────────────────
// Simple noise: sin-based pseudo-random oscillation per particle
function oscillate(i, t, amplitude) {
  return Math.sin(t * 1.3 + i * 0.00731) * amplitude
       + Math.cos(t * 0.97 + i * 0.01234) * amplitude * 0.5;
}

function animate() {
  requestAnimationFrame(animate);
  const t = Date.now() * 0.00042;
  const zoomed = zoom < ZOOM_REVEAL;
  const revealed = zoom < ZOOM_REVEAL - 1;

  // ── Cập nhật lõi ──
  const cp = particlesCore.geometry.attributes.position.array;
  for (let i = 0; i < coreCount; i++) {
    const spd  = coreRand[i*4];
    const off1 = coreRand[i*4+1];
    const off2 = coreRand[i*4+2];
    let tx, ty, tz;

    if (isHand) {
      // Hình thành + dao động nhẹ "thở"
      const breathAmp = 0.08;
      const osc = oscillate(i, t, breathAmp);
      tx = coreBase[i*3]   + osc;
      ty = coreBase[i*3+1] + osc * 0.8;
      tz = coreBase[i*3+2] + osc;
    } else {
      // Bay uyển chuyển Lissajous
      const r = 10 + Math.sin(t*spd*0.4+off2)*3;
      tx = Math.sin(t*spd     +off1      )*r;
      ty = Math.cos(t*spd*0.6 +off2      )*r*0.72;
      tz = Math.sin(t*spd*0.8 +off1+1.2  )*r;
    }

    const ls = isHand ? 0.022 : 0.016;
    cp[i*3]   += (tx - cp[i*3])   * ls;
    cp[i*3+1] += (ty - cp[i*3+1]) * ls;
    cp[i*3+2] += (tz - cp[i*3+2]) * ls;
  }
  particlesCore.geometry.attributes.position.needsUpdate = true;

  // ── Cập nhật vành đai ──
  const rp = particlesRing.geometry.attributes.position.array;
  for (let i = 0; i < ringCount; i++) {
    const spd  = ringRand[i*3];
    const off1 = ringRand[i*3+1];
    let tx, ty, tz;

    if (isHand) {
      const osc = oscillate(i+50000, t, 0.04);
      tx = ringBase[i*3]   + osc;
      ty = ringBase[i*3+1] + osc * 0.3;
      tz = ringBase[i*3+2] + osc;
    } else {
      const r2 = 12 + Math.sin(t*spd*0.3+off1)*4;
      tx = Math.cos(t*spd*0.5  +off1      )*r2;
      ty = Math.sin(t*spd*0.35 +off1+0.7  )*r2*0.32;
      tz = Math.sin(t*spd*0.6  +off1      )*r2;
    }

    const lr = isHand ? 0.018 : 0.013;
    rp[i*3]   += (tx - rp[i*3])   * lr;
    rp[i*3+1] += (ty - rp[i*3+1]) * lr;
    rp[i*3+2] += (tz - rp[i*3+2]) * lr;
  }
  particlesRing.geometry.attributes.position.needsUpdate = true;

  // ── Xoay ──
  const targetRX = isHand ? rotX : 0;
  const targetRY = isHand ? rotY : 0;
  particlesCore.rotation.x = THREE.MathUtils.lerp(particlesCore.rotation.x, targetRX, 0.04);
  particlesCore.rotation.y = THREE.MathUtils.lerp(particlesCore.rotation.y, targetRY, 0.04);
  particlesCore.rotation.y += 0.0009;
  particlesRing.rotation.x = THREE.MathUtils.lerp(particlesRing.rotation.x, targetRX+RING_TILT, 0.04);
  particlesRing.rotation.y = THREE.MathUtils.lerp(particlesRing.rotation.y, targetRY, 0.04);
  particlesRing.rotation.y += 0.0006;

  // ── Camera zoom ──
  camera.position.z = THREE.MathUtils.lerp(camera.position.z, zoom, 0.05);

  // ── Sprites ảnh: fade in/out theo zoom ──
  const targetOp = (isHand && revealed) ? 1 : 0;
  // Lấp lánh nhẹ: mỗi sprite dao động opacity
  window._photos.forEach((p, i) => {
    if (!p.sprite) return;
    const shimmer = revealed
      ? 0.85 + Math.sin(t * 1.5 + i * 1.27) * 0.15
      : 0;
    const cur = p.sprite.material.opacity;
    p.sprite.material.opacity = THREE.MathUtils.lerp(cur, shimmer, 0.04);
    p.sprite.material.needsUpdate = true;

    // Sprite xoay về phía camera (billboarding tự động với Sprite)
    // Dao động vị trí nhẹ quanh bề mặt cầu
    if (revealed && p.sprite.userData.basePos) {
      const bp = p.sprite.userData.basePos;
      const wobble = Math.sin(t * 0.8 + i * 2.1) * 0.06;
      p.sprite.position.set(
        bp.x * (1 + wobble),
        bp.y * (1 + wobble * 0.7),
        bp.z * (1 + wobble)
      );
    }
  });

  // ── Bloom giảm khi zoom vào để ảnh rõ ──
  bloom.strength = THREE.MathUtils.lerp(bloom.strength, zoomed ? 1.6 : 2.8, 0.04);

  composer.render();
}
animate();

// ─────────────────────────────────────────
// RESIZE
// ─────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

// ─────────────────────────────────────────
// EXPOSE buildCore cho admin
// ─────────────────────────────────────────
window._buildCore = buildCore;
window._rebuildSprites = window.rebuildSprites;
</script>

<!-- ─────────────────────────────────────────
     UI / ADMIN LOGIC (plain JS)
───────────────────────────────────────── -->

<script>
// ── Local storage ──
function saveToLocal() {
  localStorage.setItem('mp_photos', JSON.stringify(window._photos.map(p=>({
    url:p.url, name:p.name, date:p.date
  }))));
}
function loadFromLocal() {
  try {
    const d = JSON.parse(localStorage.getItem('mp_photos') || '[]');
    window._photos = d;
    window.rebuildSprites();
  } catch(e) {}
}

// ── Firebase (optional) ──
let fbConfig = JSON.parse(localStorage.getItem('mp_firebase') || 'null');
function saveFirebaseConfig() {
  fbConfig = {
    url: document.getElementById('fb-url').value.trim(),
    key: document.getElementById('fb-key').value.trim()
  };
  localStorage.setItem('mp_firebase', JSON.stringify(fbConfig));
  alert('✓ Đã lưu Firebase config');
}

async function loadFromFirebase() {
  if (!fbConfig?.url) return;
  try {
    const res = await fetch(`${fbConfig.url}/photos.json?auth=${fbConfig.key}`);
    const data = await res.json();
    if (data && typeof data === 'object') {
      window._photos = Object.values(data);
      window.rebuildSprites();
      saveToLocal();
    }
  } catch(e) { console.warn('Firebase load fail', e); }
}

async function saveToFirebase(photos) {
  if (!fbConfig?.url) return;
  try {
    const obj = {};
    photos.forEach((p,i) => obj[`p${i}`] = {url:p.url,name:p.name,date:p.date});
    await fetch(`${fbConfig.url}/photos.json`, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(obj)
    });
  } catch(e) { console.warn('Firebase save fail', e); }
}

// ── Admin UI ──
function toggleAdmin() {
  document.getElementById('admin-panel').classList.toggle('open');
}
function updateDensityLabel(v) {
  document.getElementById('density-label').textContent = `${parseInt(v).toLocaleString()} hạt`;
}
function applySettings() {
  const v = parseInt(document.getElementById('density-val').value);
  window._buildCore(v);
}
function resetAll() {
  if (!confirm('Xóa toàn bộ ảnh và cài đặt?')) return;
  window._photos.forEach(p => { if(p.sprite) p.sprite.visible=false; });
  window._photos = [];
  localStorage.removeItem('mp_photos');
  renderPhotoList();
  document.getElementById('photo-count').textContent = '0';
}

function addPhoto() {
  const url  = document.getElementById('photo-url').value.trim();
  const name = document.getElementById('photo-name').value.trim();
  const date = document.getElementById('photo-date').value.trim();
  if (!url) return alert('Vui lòng nhập URL ảnh');
  if (window._photos.length >= 15) return alert('Tối đa 15 ảnh');

  const idx = window._photos.length;
  window._photos.push({ url, name, date, sprite:null });
  createPhotoSprite(url, idx);
  saveToLocal();
  if (fbConfig?.url) saveToFirebase(window._photos);
  document.getElementById('photo-url').value  = '';
  document.getElementById('photo-name').value = '';
  document.getElementById('photo-date').value = '';
  document.getElementById('photo-count').textContent = window._photos.length;
  renderPhotoList();
}

function deletePhoto(idx) {
  const p = window._photos[idx];
  if (p?.sprite) p.sprite.visible = false;
  window._photos.splice(idx, 1);
  saveToLocal();
  if (fbConfig?.url) saveToFirebase(window._photos);
  window.rebuildSprites();
}

function renderPhotoList() {
  const list = document.getElementById('photo-list');
  list.innerHTML = '';
  window._photos.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'admin-photo-item';
    div.innerHTML = `
      <img src="${p.url}" onerror="this.src='data:image/svg+xml,<svg xmlns=\\"http://www.w3.org/2000/svg\\" width=\\"44\\" height=\\"44\\"><rect width=\\"44\\" height=\\"44\\" fill=\\"%23222\\"/></svg>'">
      <div class="info">
        <p>${p.name || '(Chưa đặt tên)'}</p>
        <span>${p.date || ''}</span>
      </div>
      <button class="del" onclick="deletePhoto(${i})">×</button>
    `;
    list.appendChild(div);
  });
}

// ── Viewer ──
window.openViewer = function(idx) {
  window._currentViewerIdx = idx;
  const p = window._photos[idx];
  if (!p) return;
  document.getElementById('viewer-img').src  = p.url;
  document.getElementById('viewer-name').textContent = p.name || '';
  document.getElementById('viewer-date').textContent = p.date || '';
  document.getElementById('photo-viewer').classList.add('open');
};
window.closeViewer = function() {
  document.getElementById('photo-viewer').classList.remove('open');
};
window.navigateViewer = function(dir) {
  const n = window._photos.length;
  if (!n) return;
  window._currentViewerIdx = (window._currentViewerIdx + dir + n) % n;
  window.openViewer(window._currentViewerIdx);
};
document.getElementById('photo-viewer').addEventListener('click', function(e) {
  if (e.target === this) window.closeViewer();
});

// ── Prefill Firebase config ──
if (fbConfig) {
  document.getElementById('fb-url').value = fbConfig.url || '';
  document.getElementById('fb-key').value = fbConfig.key || '';
}

// ── Load data ──
loadFromFirebase().catch(()=>{}).finally(() => {
  if (!window._photos.length) loadFromLocal();
});

// ── Zoom hint ──
setInterval(() => {
  const hint = document.getElementById('zoom-hint');
  if (!window._isHand && window._photos.length > 0) {
    hint.style.opacity = '1';
    setTimeout(()=>{ hint.style.opacity='0'; }, 2000);
  }
}, 8000);
</script>

</body>
