<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Galaxy Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: white; }
        #status { position: absolute; top: 10px; left: 10px; z-index: 10; font-family: sans-serif; font-size: 12px; color: #0f0; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="status">Đang khởi tạo hệ thống...</div>
    <video id="input_video" style="display:none" playsinline></video>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    
    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        const status = document.getElementById('status');
        const videoElement = document.getElementById('input_video');

        // 1. Khởi tạo Three.js
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Tạo hạt lấp lánh
        const count = 50000;
        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(count * 3);
        for(let i=0; i<count*3; i++) pos[i] = (Math.random() - 0.5) * 30;
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        
        const mat = new THREE.PointsMaterial({ size: 0.03, color: 0xffcc66, transparent: true, blending: THREE.AdditiveBlending });
        const stars = new THREE.Points(geo, mat);
        scene.add(stars);
        camera.position.z = 12;

        // 2. Cấu hình Hands với xử lý lỗi
        let handX = 0, handY = 0;

        try {
            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5 });

            hands.onResults((results) => {
                status.innerText = results.multiHandLandmarks.length > 0 ? "Đã thấy tay - Đang tương tác" : "Hãy đưa tay trước camera";
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const lm = results.multiHandLandmarks[0];
                    handX = (lm[8].x - 0.5) * 25;
                    handY = -(lm[8].y - 0.5) * 15;
                }
            });

            const cam = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 640, height: 480
            });
            
            cam.start().then(() => {
                status.innerText = "Camera đã sẵn sàng!";
            }).catch(err => {
                status.innerText = "Lỗi Camera: " + err;
            });

        } catch (e) {
            status.innerText = "Lỗi khởi tạo: " + e;
        }

        function animate() {
            requestAnimationFrame(animate);
            // Hiệu ứng hạt đuổi theo tay
            const positions = stars.geometry.attributes.position.array;
            for(let i=0; i<count; i++) {
                positions[i*3] += (handX - positions[i*3]) * 0.01;
                positions[i*3+1] += (handY - positions[i*3+1]) * 0.01;
            }
            stars.geometry.attributes.position.needsUpdate = true;
            stars.rotation.y += 0.001;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
