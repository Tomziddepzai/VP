<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ Ký ức của chúng mình ✦</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; }
video  { display:none; }

#intro {
  position:fixed; inset:0; z-index:50;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  pointer-events:none; transition:opacity 1.5s;
}
#intro h1 {
  font-family:'Georgia',serif; font-weight:normal;
  font-size:clamp(20px,3.5vw,34px); letter-spacing:6px;
  color:rgba(255,235,160,0);
  animation:fadeIn 3s ease-out 0.8s forwards;
}
#intro p {
  margin-top:14px; font-family:'Georgia',serif;
  font-size:clamp(10px,1.6vw,13px); letter-spacing:4px;
  text-transform:uppercase; color:rgba(255,200,80,0);
  animation:fadeIn 3s ease-out 1.8s forwards;
}
@keyframes fadeIn { to { color:rgba(255,235,160,0.65); } }

#hud {
  position:fixed; bottom:26px; left:50%; transform:translateX(-50%);
  z-index:100; pointer-events:none;
  display:flex; align-items:center; gap:9px;
  border:0.5px solid rgba(255,220,80,0.18);
  border-radius:40px; padding:7px 20px;
  opacity:0; animation:fadeHud 1s ease-out 4.5s forwards;
}
@keyframes fadeHud { to { opacity:1; } }
#hud .dot {
  width:5px; height:5px; border-radius:50%;
  background:rgba(255,200,60,0.45);
  animation:blink 2.8s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:.15} 50%{opacity:.9} }
#hud span {
  font-family:'Georgia',serif; font-size:11px;
  letter-spacing:3px; color:rgba(255,210,100,0.45);
}

#connect-status {
  position:fixed; top:18px; left:50%; transform:translateX(-50%);
  z-index:100; pointer-events:none;
  display:flex; align-items:center; gap:8px;
  opacity:0; transition:opacity 0.8s;
}
#connect-status.show { opacity:1; }
#connect-dot {
  width:7px; height:7px; border-radius:50%;
  background:rgba(100,100,100,0.4);
  transition:background 0.6s, box-shadow 0.6s;
}
#connect-dot.online {
  background:rgba(120,255,180,0.9);
  box-shadow:0 0 8px rgba(100,255,160,0.6);
  animation:heartbeat 1.8s ease-in-out infinite;
}
@keyframes heartbeat { 0%,100%{transform:scale(1)} 50%{transform:scale(1.4)} }
#connect-label {
  font-family:'Georgia',serif; font-size:11px;
  letter-spacing:2px; color:rgba(200,200,200,0.35);
  transition:color 0.6s;
}
#connect-label.online { color:rgba(120,255,180,0.7); }

#role-badge {
  position:fixed; top:18px; right:18px; z-index:100;
  font-family:'Georgia',serif; font-size:10px;
  letter-spacing:2px; color:rgba(255,210,100,0.3);
  pointer-events:none;
}

#loading {
  position:fixed; inset:0; z-index:200;
  display:flex; align-items:center; justify-content:center;
  background:#000;
  transition:opacity 0.8s;
}
#loading p {
  font-family:'Georgia',serif; font-size:12px;
  letter-spacing:4px; color:rgba(255,210,100,0.5);
}
</style>
</head>
<body>

<video id="input_video" playsinline></video>

<div id="loading"><p>Đang kết nối...</p></div>

<div id="intro">
  <h1>✦ Ký ức của chúng mình ✦</h1>
  <p>Đưa tay · Nhíu ngón để khám phá</p>
</div>

<div id="hud">
  <div class="dot"></div>
  <span id="hud-txt">Đưa tay vào khung hình</span>
</div>

<div id="connect-status">
  <div id="connect-dot"></div>
  <span id="connect-label">Chờ người kia kết nối...</span>
</div>

<div id="role-badge"></div>

<script type="importmap">
{

<script type="module">
import * as THREE from 'three';
import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { initializeApp }   from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import {
  getDatabase, ref, set, get, onValue,
  onDisconnect, runTransaction, remove
} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

// ─────────────────────────────────────────
// FIREBASE INIT
// ─────────────────────────────────────────
const app = initializeApp({
  apiKey:            "AIzaSyA8pALgEfE16ffDxR1QEGe39iyvvX-TnTk",
  authDomain:        "memory-planet-connect.firebaseapp.com",
  databaseURL:       "https://memory-planet-connect-default-rtdb.firebaseio.com",
  projectId:         "memory-planet-connect",
  storageBucket:     "memory-planet-connect.firebasestorage.app",
  messagingSenderId: "874183226734",
  appId:             "1:874183226734:web:c504aaff3206a9ca0d7d7f"
});
const db = getDatabase(app);

// ─────────────────────────────────────────
// ROLE ASSIGNMENT — dùng transaction đảm bảo atomic
// Slot A lấy trước, B lấy sau, không bao giờ trùng
// ─────────────────────────────────────────
const slotRef = ref(db, 'slots');
const myStateRef_A = ref(db, 'planets/A');
const myStateRef_B = ref(db, 'planets/B');

let myRole = null;
let myRef  = null;
let otherRef = null;

async function claimRole() {
  // Transaction trên slots: { A: true/false, B: true/false }
  // true = đang dùng, false/null = trống
  return new Promise((resolve) => {
    runTransaction(slotRef, (current) => {
      const slots = current || { A: false, B: false };
      if (!slots.A) {
        slots.A = true;
        myRole = 'A';
      } else if (!slots.B) {
        slots.B = true;
        myRole = 'B';
      } else {
        // Cả 2 đều đang dùng — abort, thử lại
        return; // returning undefined = abort transaction
      }
      return slots;
    }).then((result) => {
      if (result.committed && myRole) {
        resolve(myRole);
      } else {
        // Retry sau 1s (trường hợp cả 2 slot bận)
        setTimeout(() => claimRole().then(resolve), 1000);
      }
    }).catch(() => {
      // Fallback: nếu transaction lỗi, random role
      myRole = Math.random() < 0.5 ? 'A' : 'B';
      resolve(myRole);
    });
  });
}

// Chờ claim role xong mới khởi động Three.js
const role = await claimRole();
myRef    = ref(db, `planets/${role}`);
otherRef = ref(db, `planets/${role === 'A' ? 'B' : 'A'}`);
const slotMyRef = ref(db, `slots/${role}`);

// Khi đóng tab → giải phóng slot và xóa state
onDisconnect(myRef).remove();
onDisconnect(slotMyRef).set(false);

// Ghi initial state
await set(myRef, { online: true, isHand: false, rotX: 0, rotY: 0, zoom: 15.5, ts: Date.now() });

// Ẩn loading
const loadingEl = document.getElementById('loading');
loadingEl.style.opacity = '0';
setTimeout(() => loadingEl.style.display = 'none', 800);

// Hiện role badge
document.getElementById('role-badge').textContent =
  role === 'A' ? '✦ Người yêu' : '✦ Của tôi';

// Publish state lên Firebase
let lastPublish = 0;
function publishState(data) {
  const now = Date.now();
  if (now - lastPublish < 80) return; // throttle 80ms
  lastPublish = now;
  set(myRef, { online: true, ...data, ts: now });
}

// ─────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────
const GLOBE_R      = 4.8;
const CORE_COUNT   = 18000;
const RING_COUNT   = 8000;
const RING_TILT    = 0.24;
const ZOOM_REVEAL  = 9.5;
const ZOOM_SHOW    = 7.5;
const ZOOM_DEF     = 15.5;
const THREAD_COUNT = 3000;
const OTHER_OFFSET = 14;

// ─────────────────────────────────────────
// SCENE
// ─────────────────────────────────────────
const scene       = new THREE.Scene();
const scenePhotos = new THREE.Scene();
const camera      = new THREE.PerspectiveCamera(52, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = ZOOM_DEF;

const renderer = new THREE.WebGLRenderer({ antialias:false, powerPreference:'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight), 2.8, 0.5, 0.06
);
composer.addPass(bloom);

// ─────────────────────────────────────────
// TEXTURES
// ─────────────────────────────────────────
function glowTex(size, r, g, b) {
  const cv = document.createElement('canvas');
  cv.width = cv.height = size;
  const ctx = cv.getContext('2d');
  const grd = ctx.createRadialGradient(size/2,size/2,0, size/2,size/2,size/2);
  grd.addColorStop(0,    `rgba(${r},${g},${b},1)`);
  grd.addColorStop(0.12, `rgba(${r},${g},${b},0.9)`);
  grd.addColorStop(0.4,  `rgba(${r},${g},${b},0.35)`);
  grd.addColorStop(0.7,  `rgba(${r},${g},${b},0.08)`);
  grd.addColorStop(1,    'rgba(0,0,0,0)');
  ctx.fillStyle = grd; ctx.fillRect(0,0,size,size);
  return new THREE.CanvasTexture(cv);
}
const texCore   = glowTex(64, 255, 245, 205);  // vàng ngà
const texRing   = glowTex(32, 210, 225, 255);  // xanh lạnh
const texCoreB  = glowTex(64, 255, 180, 220);  // hồng
const texThread = glowTex(16, 255, 210, 140);  // vàng cam

// ─────────────────────────────────────────
// BUILD GLOBE helper
// ─────────────────────────────────────────
function buildGlobe(count, offsetX, texC, texR, colorC, colorR) {
  const geo   = new THREE.BufferGeometry();
  const pos   = new Float32Array(count * 3);
  const base  = new Float32Array(count * 3);
  const rnd   = new Float32Array(count * 4);

  for (let i = 0; i < count; i++) {
    const phi   = Math.acos(-1 + (2*i)/count);
    const theta = Math.sqrt(count * Math.PI) * phi;
    const r     = GLOBE_R + Math.random() * 0.6;
    base[i*3]   = r*Math.sin(phi)*Math.cos(theta) + offsetX;
    base[i*3+1] = r*Math.sin(phi)*Math.sin(theta);
    base[i*3+2] = r*Math.cos(phi);
    pos[i*3]    = (Math.random()-.5)*22 + offsetX;
    pos[i*3+1]  = (Math.random()-.5)*22;
    pos[i*3+2]  = (Math.random()-.5)*22;
    rnd[i*4]    = Math.random()*0.25+0.07;
    rnd[i*4+1]  = Math.random()*Math.PI*2;
    rnd[i*4+2]  = Math.random()*Math.PI*2;
    rnd[i*4+3]  = Math.random();
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const points = new THREE.Points(geo, new THREE.PointsMaterial({
    size:0.14, map:texC, transparent:true,
    blending:THREE.AdditiveBlending, depthWrite:false, color:colorC
  }));

  // Ring
  const geoR = new THREE.BufferGeometry();
  const posR = new Float32Array(RING_COUNT*3);
  const baseR= new Float32Array(RING_COUNT*3);
  const rndR = new Float32Array(RING_COUNT*3);
  for (let i = 0; i < RING_COUNT; i++) {
    const angle=Math.random()*Math.PI*2;
    const u=Math.random();
    const rad=6.8+u*u*5.2;
    const px=Math.cos(angle)*rad, pz=Math.sin(angle)*rad;
    const py=(Math.random()-.5)*0.07;
    baseR[i*3]  =px+offsetX;
    baseR[i*3+1]=py-pz*Math.sin(RING_TILT)*0.14;
    baseR[i*3+2]=pz*Math.cos(RING_TILT*0.14);
    posR[i*3]  =(Math.random()-.5)*24+offsetX;
    posR[i*3+1]=(Math.random()-.5)*10;
    posR[i*3+2]=(Math.random()-.5)*24;
    rndR[i*3]  =Math.random()*0.17+0.04;
    rndR[i*3+1]=Math.random()*Math.PI*2;
    rndR[i*3+2]=Math.random();
  }
  geoR.setAttribute('position', new THREE.BufferAttribute(posR, 3));
  const ring = new THREE.Points(geoR, new THREE.PointsMaterial({
    size:0.08, map:texR, transparent:true,
    blending:THREE.AdditiveBlending, depthWrite:false, color:colorR
  }));

  return { points, ring, geo, geoR, pos, base, posR, baseR, rnd, rndR };
}

// Cầu A (mình) — offset 0
const globeA = buildGlobe(CORE_COUNT, 0,            texCore,  texRing, 0xfff5cc, 0xddeeff);
// Cầu B (người kia) — offset sang phải
const globeB = buildGlobe(CORE_COUNT, OTHER_OFFSET,  texCoreB, texRing, 0xffccee, 0xffddff);

scene.add(globeA.points); scene.add(globeA.ring);
scene.add(globeB.points); scene.add(globeB.ring);
globeB.points.visible = false;
globeB.ring.visible   = false;

// ─────────────────────────────────────────
// THREAD
// ─────────────────────────────────────────
const geoThread = new THREE.BufferGeometry();
const threadPos = new Float32Array(THREAD_COUNT * 3);
const threadRnd = new Float32Array(THREAD_COUNT * 2);
for (let i = 0; i < THREAD_COUNT; i++) {
  const frac = i/THREAD_COUNT;
  threadPos[i*3]   = frac * OTHER_OFFSET;
  threadPos[i*3+1] = 0;
  threadPos[i*3+2] = 0;
  threadRnd[i*2]   = Math.random()*Math.PI*2;
  threadRnd[i*2+1] = Math.random();
}
geoThread.setAttribute('position', new THREE.BufferAttribute(threadPos, 3));
const pThread = new THREE.Points(geoThread, new THREE.PointsMaterial({
  size:0.07, map:texThread, transparent:true,
  blending:THREE.AdditiveBlending, depthWrite:false,
  color:0xffcc88, opacity:0
}));
scene.add(pThread);

// ─────────────────────────────────────────
// PHOTO CARDS
// ─────────────────────────────────────────
const photoGroup = new THREE.Group();
scenePhotos.add(photoGroup);
const GOLDEN = Math.PI*(3-Math.sqrt(5));

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function makeCard(photo, idx, total) {
  const W=300,H=225,PAD=14,FOOT=68;
  const cw=W+PAD*2, ch=H+PAD+FOOT;
  const cv=document.createElement('canvas');
  cv.width=cw; cv.height=ch;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='rgba(6,4,1,0.78)';
  roundRect(ctx,0,0,cw,ch,12); ctx.fill();
  ctx.strokeStyle='rgba(255,205,70,0.45)'; ctx.lineWidth=1;
  roundRect(ctx,0,0,cw,ch,12); ctx.stroke();
  ctx.fillStyle='rgba(40,30,10,0.5)';
  roundRect(ctx,PAD,PAD,W,H,7); ctx.fill();
  ctx.fillStyle='rgba(255,235,175,0.92)';
  ctx.font='17px Georgia'; ctx.textAlign='center';
  ctx.fillText(photo.name||'', cw/2, H+PAD+30);
  ctx.fillStyle='rgba(255,185,60,0.42)';
  ctx.font='12px Georgia';
  ctx.fillText(photo.date||'', cw/2, H+PAD+52);
  const tex=new THREE.CanvasTexture(cv);
  const mat=new THREE.SpriteMaterial({
    map:tex, transparent:true, opacity:0,
    blending:THREE.NormalBlending, depthWrite:false,
    sizeAttenuation:true, depthTest:false
  });
  const sp=new THREE.Sprite(mat);
  sp.scale.set(3.0*cw/H, 3.0, 1);
  const phi_s  =Math.acos(1-2*(idx+0.5)/total);
  const theta_s=GOLDEN*idx;
  const rr=GLOBE_R+0.5;
  sp.position.set(
    rr*Math.sin(phi_s)*Math.cos(theta_s),
    rr*Math.sin(phi_s)*Math.sin(theta_s),
    rr*Math.cos(phi_s)
  );
  sp.userData={ phase:Math.random()*Math.PI*2 };
  photoGroup.add(sp);
  const img=new Image(); img.crossOrigin='anonymous';
  img.onload=()=>{
    ctx.save(); roundRect(ctx,PAD,PAD,W,H,7); ctx.clip();
    ctx.drawImage(img,PAD,PAD,W,H); ctx.restore();
    ctx.fillStyle='rgba(255,235,175,0.92)';
    ctx.font='17px Georgia'; ctx.textAlign='center';
    ctx.fillText(photo.name||'', cw/2, H+PAD+30);
    ctx.fillStyle='rgba(255,185,60,0.42)';
    ctx.font='12px Georgia';
    ctx.fillText(photo.date||'', cw/2, H+PAD+52);
    tex.needsUpdate=true;
  };
  img.src=photo.url;
  return sp;
}
const sprites=PHOTOS.map((p,i)=>makeCard(p,i,PHOTOS.length));

// ─────────────────────────────────────────
// LISTEN OTHER DEVICE
// ─────────────────────────────────────────
let otherState = null;
onValue(otherRef, snap => {
  const data = snap.val();
  otherState = (data && data.online) ? data : null;

  const dot   = document.getElementById('connect-dot');
  const label = document.getElementById('connect-label');
  document.getElementById('connect-status').classList.add('show');

  if (otherState) {
    dot.classList.add('online');
    label.classList.add('online');
    label.textContent = role==='A' ? '✦ Người yêu đang online' : '✦ Của tôi đang online';
  } else {
    dot.classList.remove('online');
    label.classList.remove('online');
    label.textContent = 'Chờ người kia kết nối...';
  }
});

// ─────────────────────────────────────────
// HAND TRACKING
// ─────────────────────────────────────────
const videoEl=document.getElementById('input_video');
let rotX=0, rotY=0, zoom=ZOOM_DEF, isHand=false;

const handsMP=new Hands({ locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
handsMP.setOptions({ maxNumHands:1, modelComplexity:1, minDetectionConfidence:0.6 });
handsMP.onResults(res=>{
  const txt=document.getElementById('hud-txt');
  if (res.multiHandLandmarks?.length>0) {
    isHand=true;
    const lm=res.multiHandLandmarks[0];
    rotY=(lm[9].x-0.5)*Math.PI*1.4;
    rotX=(lm[9].y-0.5)*Math.PI*0.85;
    const d=Math.hypot(lm[4].x-lm[8].x, lm[4].y-lm[8].y);
    zoom=THREE.MathUtils.clamp(
      THREE.MathUtils.mapLinear(d,0.05,0.26,17,7.0), 7.0, 17
    );
    txt.textContent=zoom<ZOOM_REVEAL?'✦ Xoay tay để khám phá':'Nhíu ngón tay để zoom vào';
    publishState({ isHand:true, rotX, rotY, zoom });
  } else {
    isHand=false;
    rotX*=0.96; rotY*=0.96;
    zoom=THREE.MathUtils.lerp(zoom,ZOOM_DEF,0.03);
    txt.textContent='Đưa tay vào khung hình';
    publishState({ isHand:false, rotX:0, rotY:0, zoom:ZOOM_DEF });
  }
});
new Camera(videoEl,{
  onFrame:async()=>await handsMP.send({image:videoEl}),
  width:640, height:480
}).start();
window.addEventListener('wheel',e=>{
  zoom=THREE.MathUtils.clamp(zoom+e.deltaY*0.012,7.0,20);
},{passive:true});

// ─────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────
function osc(i,t,amp){
  return Math.sin(t*1.1+i*0.00831)*amp
       + Math.cos(t*0.73+i*0.01543)*amp*0.45;
}

function updateGlobe(globe, count, isActive, oRotX, oRotY, offsetX, t, isOther) {
  const cp=globe.geo.attributes.position.array;
  for (let i=0;i<count;i++) {
    const spd=globe.rnd[i*4], o1=globe.rnd[i*4+1], o2=globe.rnd[i*4+2];
    let tx,ty,tz;
    if (isActive) {
      const b=osc(i+(isOther?99999:0), t, 0.065);
      tx=globe.base[i*3]+b;
      ty=globe.base[i*3+1]+b*0.7;
      tz=globe.base[i*3+2]+b;
    } else {
      const r=10+Math.sin(t*spd*0.38+o2)*3.2;
      tx=Math.sin(t*spd+o1)*r + offsetX;
      ty=Math.cos(t*spd*0.58+o2)*r*0.68;
      tz=Math.sin(t*spd*0.82+o1+1.3)*r;
    }
    const ls=isActive?0.020:0.015;
    cp[i*3]  +=(tx-cp[i*3]  )*ls;
    cp[i*3+1]+=(ty-cp[i*3+1])*ls;
    cp[i*3+2]+=(tz-cp[i*3+2])*ls;
  }
  globe.geo.attributes.position.needsUpdate=true;
  globe.points.rotation.x=THREE.MathUtils.lerp(globe.points.rotation.x, oRotX, 0.04);
  globe.points.rotation.y=THREE.MathUtils.lerp(globe.points.rotation.y, oRotY, 0.04);
  globe.points.rotation.y+=0.00085;
  globe.ring.rotation.x=THREE.MathUtils.lerp(globe.ring.rotation.x, oRotX+RING_TILT, 0.04);
  globe.ring.rotation.y=THREE.MathUtils.lerp(globe.ring.rotation.y, oRotY, 0.04);
  globe.ring.rotation.y+=0.00055;
}

// ─────────────────────────────────────────
// ANIMATION
// ─────────────────────────────────────────
let camTargetX=0;

function animate() {
  requestAnimationFrame(animate);
  const t=Date.now()*0.00040;
  const connected=!!(otherState&&otherState.online);
  const oIsHand=connected&&otherState.isHand;
  const oRotX=connected?(otherState.rotX||0):0;
  const oRotY=connected?(otherState.rotY||0):0;
  const revealed=isHand&&zoom<ZOOM_REVEAL;

  // Cầu A (mình)
  updateGlobe(globeA, CORE_COUNT, isHand, isHand?rotX:0, isHand?rotY:0, 0, t, false);

  // Cầu B (người kia)
  if (connected) {
    globeB.points.visible=true;
    globeB.ring.visible=true;
    updateGlobe(globeB, CORE_COUNT, oIsHand, oRotX, oRotY, OTHER_OFFSET, t, true);

    // Thread
    const tp=pThread.geometry.attributes.position.array;
    const targetThreadOp=(isHand&&oIsHand)?0.85:0.35;
    pThread.material.opacity=THREE.MathUtils.lerp(pThread.material.opacity,targetThreadOp,0.04);
    for (let i=0;i<THREAD_COUNT;i++) {
      const frac=i/THREAD_COUNT;
      const phase=threadRnd[i*2];
      const sag=Math.sin(frac*Math.PI)*0.9;
      const wave=Math.sin(t*2.5+phase+frac*Math.PI*4)*0.15;
      tp[i*3]  =frac*OTHER_OFFSET;
      tp[i*3+1]=-sag+wave;
      tp[i*3+2]=Math.cos(t*1.8+phase)*0.12;
    }
    pThread.geometry.attributes.position.needsUpdate=true;
    camTargetX=OTHER_OFFSET*0.5;
  } else {
    globeB.points.visible=false;
    globeB.ring.visible=false;
    pThread.material.opacity=THREE.MathUtils.lerp(pThread.material.opacity,0,0.04);
    camTargetX=0;
  }

  // photoGroup theo cầu A
  photoGroup.rotation.x=globeA.points.rotation.x;
  photoGroup.rotation.y=globeA.points.rotation.y;

  // Camera
  const targetZ=connected?zoom+5:zoom;
  camera.position.z=THREE.MathUtils.lerp(camera.position.z,targetZ,0.05);
  camera.position.x=THREE.MathUtils.lerp(camera.position.x,camTargetX,0.04);

  // Sprites
  const zf=THREE.MathUtils.clamp(
    THREE.MathUtils.mapLinear(zoom,ZOOM_REVEAL,ZOOM_SHOW,0,1),0,1
  );
  const baseOp=isHand?zf*zf*(3-2*zf)*0.82:0;
  sprites.forEach(sp=>{
    if (!sp) return;
    const shimmer=baseOp>0.05?Math.sin(t*0.9+sp.userData.phase)*0.06:0;
    sp.material.opacity=THREE.MathUtils.lerp(
      sp.material.opacity,
      THREE.MathUtils.clamp(baseOp+shimmer,0,1),
      0.04
    );
    sp.material.needsUpdate=true;
  });

  // Bloom
  bloom.strength=THREE.MathUtils.lerp(
    bloom.strength,
    THREE.MathUtils.mapLinear(THREE.MathUtils.clamp(zoom,ZOOM_SHOW,ZOOM_DEF),ZOOM_SHOW,ZOOM_DEF,0.6,2.8),
    0.04
  );

  if (isHand) {
    const intro=document.getElementById('intro');
    if (intro) intro.style.opacity='0';
  }

  composer.render();
  renderer.autoClear=false;
  renderer.render(scenePhotos,camera);
  renderer.autoClear=true;
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  composer.setSize(innerWidth,innerHeight);
  bloom.resolution.set(innerWidth,innerHeight);
});
</script>
