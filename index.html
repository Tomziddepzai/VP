<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Magic Particle Sphere</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #status { position: absolute; top: 10px; left: 10px; color: #fbff00; font-family: monospace; z-index: 100; }
    </style>
</head>
<body>
    <div id="status">Đang tải AI nhận diện tay...</div>
    <video id="input_video" style="display:none" playsinline></video>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        const videoElement = document.getElementById('input_video');
        const status = document.getElementById('status');

        // 1. Setup Three.js với hiệu ứng Bloom nhẹ
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        camera.position.z = 15;

        // Tạo Texture hạt tròn lấp lánh (để hết bị vuông thô)
        const createCircleTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.2, 'rgba(255,200,0,0.8)');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        };

        // 2. Khởi tạo 50,000 hạt
        const count = 50000;
        const geo = new THREE.BufferGeometry();
        const positions = new Float32Array(count * 3);
        const randomTargets = new Float32Array(count * 3); // Vị trí lúc bay lung tung

        for(let i=0; i<count; i++) {
            positions[i*3] = (Math.random() - 0.5) * 40;
            positions[i*3+1] = (Math.random() - 0.5) * 40;
            positions[i*3+2] = (Math.random() - 0.5) * 40;
            
            randomTargets[i*3] = positions[i*3];
            randomTargets[i*3+1] = positions[i*3+1];
            randomTargets[i*3+2] = positions[i*3+2];
        }

        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const mat = new THREE.PointsMaterial({
            size: 0.08,
            map: createCircleTexture(),
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            color: 0xffcc00
        });

        const particles = new THREE.Points(geo, mat);
        scene.add(particles);

        // 3. AI Nhận diện tay
        let handX = 0, handY = 0, isHandVisible = false, zoomLevel = 15;

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6 });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                isHandVisible = true;
                const lm = results.multiHandLandmarks[0];
                handX = (lm[9].x - 0.5) * -30; // Tâm bàn tay
                handY = (lm[9].y - 0.5) * -20;

                // Tính khoảng cách ngón cái (4) và ngón trỏ (8) để Zoom
                const d = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);
                // Kéo ra (d lớn) -> zoomLevel nhỏ (lại gần), Chụm vào (d nhỏ) -> zoomLevel lớn (ra xa)
                zoomLevel = THREE.MathUtils.lerp(zoomLevel, THREE.MathUtils.mapLinear(d, 0.05, 0.3, 25, 5), 0.1);
                status.innerText = "Đang điều khiển Vũ trụ...";
            } else {
                isHandVisible = false;
                status.innerText = "Hãy đưa tay vào camera";
            }
        });

        const cam = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        cam.start();

        // 4. Vòng lặp chính - Logic bay hạt
        function animate() {
            requestAnimationFrame(animate);
            const posAttr = particles.geometry.attributes.position;
            
            camera.position.z = THREE.MathUtils.lerp(camera.position.z, zoomLevel, 0.05);

            for(let i=0; i<count; i++) {
                let tx, ty, tz;
                if(isHandVisible) {
                    // Tạo hình cầu tại vị trí tay
                    const phi = Math.acos(-1 + (2 * i) / count);
                    const theta = Math.sqrt(count * Math.PI) * phi;
                    tx = handX + 4 * Math.sin(phi) * Math.cos(theta);
                    ty = handY + 4 * Math.sin(phi) * Math.sin(theta);
                    tz = 4 * Math.cos(phi);
                } else {
                    // Bay lung tung theo vị trí ngẫu nhiên ban đầu + độ nhiễu (noise)
                    tx = randomTargets[i*3] + Math.sin(Date.now() * 0.001 + i) * 0.5;
                    ty = randomTargets[i*3+1] + Math.cos(Date.now() * 0.001 + i) * 0.5;
                    tz = randomTargets[i*3+2];
                }

                // Di chuyển hạt mượt mà đến đích (Lerp)
                posAttr.array[i*3] += (tx - posAttr.array[i*3]) * 0.1;
                posAttr.array[i*3+1] += (ty - posAttr.array[i*3+1]) * 0.1;
                posAttr.array[i*3+2] += (tz - posAttr.array[i*3+2]) * 0.1;
            }

            posAttr.needsUpdate = true;
            particles.rotation.y += 0.002;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
