<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Golden Planet - Ultra Cinematic</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; cursor: none; }
        canvas { display: block; }
    </style>
</head>
<body>
    <video id="input_video" style="display:none" playsinline></video>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        const videoElement = document.getElementById('input_video');

        // --- 1. SETUP VŨ TRỤ ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 15; // Khởi đầu gần hơn

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // HIỆU ỨNG PHÁT SÁNG SANG TRỌNG
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        // Tăng cường độ Bloom (3.0) và giảm Radius để hạt sắc nét hơn
        const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 3.0, 0.3, 0.1);
        composer.addPass(bloom);

        // Texture hạt vàng kim loại (có tâm trắng cực sáng)
        const texture = (() => {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const g = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            g.addColorStop(0, 'rgba(255, 255, 255, 1)');      // Tâm trắng tinh khôi
            g.addColorStop(0.1, 'rgba(255, 230, 100, 1)');    // Vàng nắng sáng
            g.addColorStop(0.3, 'rgba(212, 175, 55, 0.6)');   // Vàng đồng (Gold leaf)
            g.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = g; ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        })();

        // --- 2. HỆ THỐNG HẠT ---
        const pCount = 35000;
        const geo = new THREE.BufferGeometry();
        const positions = new Float32Array(pCount * 3);
        const basePos = new Float32Array(pCount * 3);
        const idlePos = new Float32Array(pCount * 3);
        const randoms = new Float32Array(pCount);

        for (let i = 0; i < pCount; i++) {
            let x, y, z;
            if (i < 18000) { // Lõi hành tinh
                const phi = Math.acos(-1 + (2 * i) / 18000);
                const theta = Math.sqrt(18000 * Math.PI) * phi;
                const r = 5;
                x = r * Math.sin(phi) * Math.cos(theta);
                y = r * Math.sin(phi) * Math.sin(theta);
                z = r * Math.cos(phi);
            } else { // VÀNH ĐAI DÀY & NGHIÊNG
                const angle = Math.random() * Math.PI * 2;
                const r = 7.5 + Math.random() * 4.5;
                x = Math.cos(angle) * r;
                y = (Math.random() - 0.5) * 0.6; // Tăng độ dày vành đai
                z = Math.sin(angle) * r;
            }
            basePos[i*3] = x; basePos[i*3+1] = y; basePos[i*3+2] = z;

            // Nhảy múa vùng gần
            idlePos[i*3] = (Math.random() - 0.5) * 22;
            idlePos[i*3+1] = (Math.random() - 0.5) * 18;
            idlePos[i*3+2] = (Math.random() - 0.5) * 18;

            positions[i*3] = idlePos[i*3];
            positions[i*3+1] = idlePos[i*3+1];
            positions[i*3+2] = idlePos[i*3+2];
            randoms[i] = Math.random() * 0.4 + 0.1;
        }

        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const mat = new THREE.PointsMaterial({
            size: 0.15, map: texture, transparent: true,
            blending: THREE.AdditiveBlending, depthWrite: false, color: 0xfff0aa
        });
        const particles = new THREE.Points(geo, mat);
        
        // NGHIÊNG HÀNH TINH (Cinematic Tilt)
        particles.rotation.z = 0.5;
        scene.add(particles);

        // --- 3. ĐIỀU KHIỂN ---
        let isHand = false;
        let rotX = 0, rotY = 0, zoom = 15;

        const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6 });

        hands.onResults((res) => {
            if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
                isHand = true;
                const lm = res.multiHandLandmarks[0];
                rotY = (lm[9].x - 0.5) * Math.PI;
                rotX = (lm[9].y - 0.5) * Math.PI * 0.5;

                const d = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);
                // ZOOM SÁT BỀ MẶT: Chặn ở mức 6.5 (Bán kính hành tinh là 5)
                zoom = THREE.MathUtils.clamp(THREE.MathUtils.mapLinear(d, 0.05, 0.25, 15, 6.5), 6.5, 15);
            } else {
                isHand = false;
                zoom = THREE.MathUtils.lerp(zoom, 15, 0.03);
            }
        });

        const camS = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        camS.start();

        // --- 4. ANIMATION ---
        function animate() {
            requestAnimationFrame(animate);
            const t = Date.now() * 0.00035; // Chậm rãi hơn nữa
            const pos = particles.geometry.attributes.position.array;

            for (let i = 0; i < pCount; i++) {
                let tx, ty, tz;
                const s = randoms[i];

                if (isHand) {
                    const wave = Math.sin(t * 3 + i) * 0.08;
                    tx = basePos[i*3] + wave;
                    ty = basePos[i*3+1] + wave;
                    tz = basePos[i*3+2] + wave;
                } else {
                    tx = idlePos[i*3] + Math.sin(t * s * 3) * 2;
                    ty = idlePos[i*3+1] + Math.cos(t * s * 2) * 2;
                    tz = idlePos[i*3+2] + Math.sin(t * s * 1.5) * 2;
                }

                const speed = isHand ? 0.07 : 0.02;
                pos[i*3] += (tx - pos[i*3]) * speed;
                pos[i*3+1] += (ty - pos[i*3+1]) * speed;
                pos[i*3+2] += (tz - pos[i*3+2]) * speed;
            }

            particles.geometry.attributes.position.needsUpdate = true;
            particles.rotation.x = THREE.MathUtils.lerp(particles.rotation.x, rotX, 0.05);
            particles.rotation.y = THREE.MathUtils.lerp(particles.rotation.y, rotY, 0.05);
            particles.rotation.y += 0.0008; // Xoay nền cực chậm
            
            camera.position.z = THREE.MathUtils.lerp(camera.position.z, zoom, 0.05);

            composer.render();
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
