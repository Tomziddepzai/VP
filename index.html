<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Memory Planet - Ultimate</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
        #loading { position: absolute; top: 10px; left: 10px; color: #ffcc00; font-family: monospace; z-index: 10; text-shadow: 0 0 5px #ffaa00; }
    </style>
</head>
<body>
    <div id="loading">Đang kết nối Vũ trụ...</div>
    <video id="input_video" style="display:none" playsinline></video>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        const videoElement = document.getElementById('input_video');
        const loadingText = document.getElementById('loading');

        // --- 1. SETUP VŨ TRỤ ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 25; // Bắt đầu ở xa

        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // Hiệu ứng phát sáng vàng rực (Bloom)
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.2, 0.5, 0.1);
        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // Texture hạt lấp lánh
        const createGlowTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');      // Tâm trắng
            gradient.addColorStop(0.15, 'rgba(255, 204, 51, 1)');    // Vàng sáng
            gradient.addColorStop(0.4, 'rgba(255, 153, 0, 0.4)');    // Cam lân tinh
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        };

        // --- 2. HỆ THỐNG HẠT ĐỘNG (DYNAMIC PARTICLES) ---
        const pCount = 30000; // 15k lõi + 15k vành đai
        const geo = new THREE.BufferGeometry();
        
        // Mảng chứa tọa độ thực tế, tọa độ gốc (khi tạo hình), và tham số ngẫu nhiên
        const positions = new Float32Array(pCount * 3);
        const basePositions = new Float32Array(pCount * 3);
        const randomFactors = new Float32Array(pCount * 3);

        // Tạo hình dáng gốc (Hành tinh + Vành đai)
        for (let i = 0; i < pCount; i++) {
            let tx, ty, tz;

            if (i < 15000) {
                // Lõi hành tinh (R = 5)
                const phi = Math.acos(-1 + (2 * i) / 15000);
                const theta = Math.sqrt(15000 * Math.PI) * phi;
                const r = 5;
                tx = r * Math.sin(phi) * Math.cos(theta);
                ty = r * Math.sin(phi) * Math.sin(theta);
                tz = r * Math.cos(phi);
            } else {
                // Vành đai (R = 6.5 đến 11)
                const angle = Math.random() * Math.PI * 2;
                const r = 6.5 + Math.random() * 4.5;
                tx = Math.cos(angle) * r;
                ty = (Math.random() - 0.5) * 0.3; // Dẹt
                tz = Math.sin(angle) * r;
                
                // Nghiêng vành đai
                const tempY = ty * Math.cos(0.5) - tz * Math.sin(0.5);
                const tempZ = ty * Math.sin(0.5) + tz * Math.cos(0.5);
                ty = tempY; tz = tempZ;
            }

            // Lưu tọa độ đích
            basePositions[i*3] = tx;
            basePositions[i*3+1] = ty;
            basePositions[i*3+2] = tz;

            // Tọa độ khởi đầu (Bay lung tung)
            positions[i*3] = (Math.random() - 0.5) * 60;
            positions[i*3+1] = (Math.random() - 0.5) * 60;
            positions[i*3+2] = (Math.random() - 0.5) * 60;

            // Lưu tham số bay ngẫu nhiên (tốc độ, quỹ đạo)
            randomFactors[i*3] = Math.random() * 2 + 1;
            randomFactors[i*3+1] = Math.random() * Math.PI * 2;
            randomFactors[i*3+2] = Math.random() * Math.PI * 2;
        }

        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        
        const mat = new THREE.PointsMaterial({
            size: 0.12, map: createGlowTexture(), transparent: true,
            blending: THREE.AdditiveBlending, depthWrite: false, color: 0xffd966
        });

        const particleGroup = new THREE.Points(geo, mat);
        scene.add(particleGroup);

        // --- 3. TƯƠNG TÁC TAY ---
        let isHandVisible = false;
        let targetRotationX = 0;
        let targetRotationY = 0;
        let targetZoom = 25; // Mặc định ở xa

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6 });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                if (!isHandVisible) loadingText.innerText = "Đã khóa mục tiêu!";
                isHandVisible = true;
                const lm = results.multiHandLandmarks[0];
                
                // Điều khiển xoay
                targetRotationY = (lm[9].x - 0.5) * Math.PI * 2; 
                targetRotationX = (lm[9].y - 0.5) * Math.PI;

                // Điều khiển Zoom
                const d = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);
                
                // GIỚI HẠN ZOOM: Không bao giờ vào gần hơn 7 (bề mặt hành tinh là 5)
                targetZoom = THREE.MathUtils.clamp(THREE.MathUtils.mapLinear(d, 0.05, 0.25, 25, 7), 7, 25);
            } else {
                isHandVisible = false;
                loadingText.innerText = "Hãy đưa tay lên để triệu hồi hành tinh...";
                // Trả về mặc định khi rút tay
                targetRotationX = 0; targetRotationY = 0; targetZoom = 25;
            }
        });

        const cam = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        cam.start().then(() => loadingText.innerText = "Hãy đưa tay lên để triệu hồi hành tinh...");

        // --- 4. VÒNG LẶP CHUYỂN ĐỘNG (ANIMATION) ---
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.0005;
            const posAttr = particleGroup.geometry.attributes.position.array;

            // 1. Cập nhật từng hạt sáng
            for (let i = 0; i < pCount; i++) {
                let tx, ty, tz;
                const rx = randomFactors[i*3];
                const ry = randomFactors[i*3+1];

                if (isHandVisible) {
                    // KHI CÓ TAY: Hút về tọa độ tạo hình + Dao động nhẹ nhàng (Thở)
                    const wave = Math.sin(time * 3 + ry) * 0.15; // Biên độ dao động
                    tx = basePositions[i*3] + wave;
                    ty = basePositions[i*3+1] + wave;
                    tz = basePositions[i*3+2] + wave;
                } else {
                    // CHƯA CÓ TAY: Bay lơ lửng uyển chuyển như đom đóm
                    tx = Math.sin(time * rx + ry) * 35;
                    ty = Math.cos(time * 0.8 + rx) * 35;
                    tz = Math.sin(time * 1.2 + ry) * 35;
                }

                // Chuyển động mượt mà (Lerp) từ vị trí hiện tại đến đích
                posAttr[i*3] += (tx - posAttr[i*3]) * 0.04;
                posAttr[i*3+1] += (ty - posAttr[i*3+1]) * 0.04;
                posAttr[i*3+2] += (tz - posAttr[i*3+2]) * 0.04;
            }
            particleGroup.geometry.attributes.position.needsUpdate = true;

            // 2. Cập nhật Xoay và Zoom bằng tay
            particleGroup.rotation.x = THREE.MathUtils.lerp(particleGroup.rotation.x, targetRotationX, 0.05);
            particleGroup.rotation.y = THREE.MathUtils.lerp(particleGroup.rotation.y, targetRotationY, 0.05);
            
            // Tự xoay nhẹ thêm để có độ động
            particleGroup.rotation.y += 0.002; 
            
            camera.position.z = THREE.MathUtils.lerp(camera.position.z, targetZoom, 0.05);

            composer.render();
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
