<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ Ký ức của chúng mình ✦</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Georgia',serif; }
canvas { display:block; }
video  { display:none; }

/* LOADING */
#loading {
  position:fixed; inset:0; z-index:500;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:#000; transition:opacity 1s;
}
#loading p {
  font-size:12px; letter-spacing:5px; text-transform:uppercase;
  color:rgba(255,210,100,0.4);
  animation:pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }

/* INTRO */
#intro {
  position:fixed; inset:0; z-index:50;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  pointer-events:none; transition:opacity 2s;
}
#intro h1 {
  font-weight:normal; font-size:clamp(18px,3vw,32px);
  letter-spacing:7px; color:rgba(255,235,160,0);
  animation:fadeIn 3s ease-out 0.5s forwards;
}
#intro p {
  margin-top:12px; font-size:clamp(9px,1.4vw,12px);
  letter-spacing:4px; text-transform:uppercase;
  color:rgba(255,200,80,0);
  animation:fadeIn 3s ease-out 1.5s forwards;
}
@keyframes fadeIn { to { color:rgba(255,235,160,0.6); } }

/* HUD bottom */
#hud {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  z-index:100; pointer-events:none;
  display:flex; align-items:center; gap:8px;
  border:0.5px solid rgba(255,220,80,0.15);
  border-radius:40px; padding:6px 18px;
  opacity:0; animation:showHud 1s ease-out 5s forwards;
}
@keyframes showHud { to{opacity:1} }
#hud .dot {
  width:5px; height:5px; border-radius:50%;
  background:rgba(255,200,60,0.4);
  animation:blink 2.5s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:.1}50%{opacity:.9}}
#hud span { font-size:10px; letter-spacing:3px; color:rgba(255,210,100,0.4); }

/* CONNECTION STATUS — top center */
#conn {
  position:fixed; top:20px; left:50%; transform:translateX(-50%);
  z-index:100; pointer-events:none;
  display:flex; align-items:center; gap:8px;
  opacity:0; transition:opacity 0.8s;
}
#conn.show { opacity:1; }
#conn-dot {
  width:8px; height:8px; border-radius:50%;
  background:rgba(80,80,80,0.5);
  transition:all 0.8s;
}
#conn-dot.live {
  background:rgba(100,255,160,0.95);
  box-shadow:0 0 10px rgba(80,255,140,0.7);
  animation:beat 2s ease-in-out infinite;
}
@keyframes beat{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}
#conn-txt {
  font-size:10px; letter-spacing:3px; text-transform:uppercase;
  color:rgba(180,180,180,0.35); transition:color 0.8s;
}
#conn-txt.live { color:rgba(100,255,160,0.65); }

/* ROLE */
#role {
  position:fixed; top:20px; right:20px; z-index:100;
  font-size:9px; letter-spacing:3px; text-transform:uppercase;
  color:rgba(255,210,100,0.25); pointer-events:none;
}

/* ENERGY BAR — hiện khi cả 2 có tay */
#energy-bar {
  position:fixed; bottom:60px; left:50%; transform:translateX(-50%);
  z-index:100; pointer-events:none;
  width:200px; height:1px;
  background:rgba(255,255,255,0.05);
  border-radius:1px; opacity:0; transition:opacity 0.5s;
}
#energy-fill {
  height:100%; width:0%; border-radius:1px;
  background:linear-gradient(90deg, rgba(255,180,60,0.6), rgba(255,255,200,0.9), rgba(255,180,60,0.6));
  transition:width 0.3s ease;
  box-shadow:0 0 6px rgba(255,200,80,0.8);
}
</style>
</head>
<body>

<video id="input_video" playsinline></video>

<div id="loading"><p>Đang kết nối...</p></div>

<div id="intro">
  <h1>✦ Ký ức của chúng mình ✦</h1>
  <p>Đưa tay · Nhíu ngón để khám phá</p>
</div>

<div id="hud"><div class="dot"></div><span id="hud-txt">Đưa tay vào khung hình</span></div>
<div id="conn"><div id="conn-dot"></div><span id="conn-txt">Chờ kết nối...</span></div>
<div id="role"></div>
<div id="energy-bar"><div id="energy-fill"></div></div>

<!-- ══════════════════════════════════════
     ✦  THÊM ẢNH Ở ĐÂY (URL ImgBB)
════════════════════════════════════════ -->
<script>
const PHOTOS = [
  { url:'https://picsum.photos/seed/a1/600/450', name:'Lần đầu gặp nhau',   date:'14.02.2022' },
  { url:'https://picsum.photos/seed/b2/600/450', name:'Cà phê sáng hôm ấy', date:'20.03.2022' },
  { url:'https://picsum.photos/seed/c3/600/450', name:'Sinh nhật em',         date:'05.07.2022' },
  { url:'https://picsum.photos/seed/d4/600/450', name:'Chuyến đi Đà Lạt',    date:'10.09.2022' },
  { url:'https://picsum.photos/seed/e5/600/450', name:'Mưa hôm ấy',           date:'03.11.2022' },
  { url:'https://picsum.photos/seed/f6/600/450', name:'Giáng sinh đầu tiên',  date:'25.12.2022' },

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",

<script type="module">
import * as THREE from 'three';
import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { initializeApp }   from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import {
  getDatabase, ref, set, onValue, onDisconnect, runTransaction
} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

// ═══════════════════════════════════════════
// FIREBASE
// ═══════════════════════════════════════════
const app = initializeApp({
  apiKey:            "AIzaSyA8pALgEfE16ffDxR1QEGe39iyvvX-TnTk",
  authDomain:        "memory-planet-connect.firebaseapp.com",
  databaseURL:       "https://memory-planet-connect-default-rtdb.firebaseio.com",
  projectId:         "memory-planet-connect",
  storageBucket:     "memory-planet-connect.firebasestorage.app",
  messagingSenderId: "874183226734",
  appId:             "1:874183226734:web:c504aaff3206a9ca0d7d7f"
});
const db = getDatabase(app);

// Atomic role claim
let myRole = null;
await new Promise((resolve) => {
  const attempt = () => {
    runTransaction(ref(db, 'slots'), (cur) => {
      const s = cur || { A: false, B: false };
      if (!s.A)      { s.A = true; myRole = 'A'; }
      else if (!s.B) { s.B = true; myRole = 'B'; }
      else return; // abort
      return s;
    }).then(r => {
      if (r.committed) resolve();
      else setTimeout(attempt, 800);
    }).catch(() => { myRole = Math.random()<.5?'A':'B'; resolve(); });
  };
  attempt();
});

const myRef    = ref(db, `planets/${myRole}`);
const otherRef = ref(db, `planets/${myRole==='A'?'B':'A'}`);
onDisconnect(ref(db, `slots/${myRole}`)).set(false);
onDisconnect(myRef).remove();

// Publish throttled
let _lastPub = 0;
function publish(data) {
  const now = Date.now();
  if (now - _lastPub < 60) return;
  _lastPub = now;
  set(myRef, { online:true, ...data, ts:now });
}

// UI
document.getElementById('loading').style.opacity = '0';
setTimeout(() => document.getElementById('loading').style.display='none', 1000);
document.getElementById('role').textContent = myRole==='A' ? '✦ Người yêu' : '✦ Của tôi';
document.getElementById('conn').classList.add('show');

// Listen other
let other = null;
onValue(otherRef, snap => {
  const d = snap.val();
  other = (d && d.online) ? d : null;
  const live = !!other;
  document.getElementById('conn-dot').classList.toggle('live', live);
  document.getElementById('conn-txt').classList.toggle('live', live);
  document.getElementById('conn-txt').textContent = live
    ? (myRole==='A' ? '✦ Người yêu đang ở đây' : '✦ Của tôi đang ở đây')
    : 'Chờ người kia kết nối...';
});

// ═══════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════
const GLOBE_R     = 4.5;
const CORE_N      = 16000;
const RING_N      = 7000;
const RING_TILT   = 0.24;
const THREAD_N    = 5000;   // nhiều hạt dây hơn
const STREAM_N    = 800;    // hạt chạy dọc dây
const ZOOM_REVEAL = 9.5;
const ZOOM_SHOW   = 7.5;
const ZOOM_DEF    = 15.5;

// Khoảng cách 2 cầu — sẽ thay đổi động theo tương tác
let globeDist = 13.0;       // target distance
let globeDistCur = 13.0;    // current (lerped)

// ═══════════════════════════════════════════
// SCENE
// ═══════════════════════════════════════════
const scene       = new THREE.Scene();
const scenePhotos = new THREE.Scene();
const camera      = new THREE.PerspectiveCamera(52, innerWidth/innerHeight, 0.1, 2000);
camera.position.z = ZOOM_DEF;

const renderer = new THREE.WebGLRenderer({ antialias:false, powerPreference:'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight), 2.6, 0.5, 0.05);
composer.addPass(bloom);

// ═══════════════════════════════════════════
// TEXTURES
// ═══════════════════════════════════════════
function mkTex(size, r, g, b) {
  const cv = document.createElement('canvas');
  cv.width = cv.height = size;
  const ctx = cv.getContext('2d');
  const g2 = ctx.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
  g2.addColorStop(0,   `rgba(${r},${g},${b},1)`);
  g2.addColorStop(0.1, `rgba(${r},${g},${b},0.95)`);
  g2.addColorStop(0.4, `rgba(${r},${g},${b},0.3)`);
  g2.addColorStop(0.7, `rgba(${r},${g},${b},0.07)`);
  g2.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle=g2; ctx.fillRect(0,0,size,size);
  return new THREE.CanvasTexture(cv);
}
const tCore   = mkTex(64, 255, 245, 205);
const tCoreB  = mkTex(64, 255, 180, 215);
const tRing   = mkTex(32, 210, 225, 255);
const tRingB  = mkTex(32, 255, 200, 240);
const tThread = mkTex(16, 255, 215, 150);
const tStream = mkTex(12, 255, 255, 220);

// ═══════════════════════════════════════════
// GLOBE BUILDER
// ═══════════════════════════════════════════
function buildGlobe(n, tc, tr, cc, cr) {
  // Core
  const gC  = new THREE.BufferGeometry();
  const pos = new Float32Array(n*3);
  const base= new Float32Array(n*3);
  const rnd = new Float32Array(n*4);
  for (let i=0;i<n;i++) {
    const phi  =Math.acos(-1+(2*i)/n);
    const theta=Math.sqrt(n*Math.PI)*phi;
    const r    =GLOBE_R+Math.random()*0.6;
    base[i*3]  =r*Math.sin(phi)*Math.cos(theta);
    base[i*3+1]=r*Math.sin(phi)*Math.sin(theta);
    base[i*3+2]=r*Math.cos(phi);
    pos[i*3]  =(Math.random()-.5)*20;
    pos[i*3+1]=(Math.random()-.5)*20;
    pos[i*3+2]=(Math.random()-.5)*20;
    rnd[i*4]  =Math.random()*.24+.07;
    rnd[i*4+1]=Math.random()*Math.PI*2;
    rnd[i*4+2]=Math.random()*Math.PI*2;
    rnd[i*4+3]=Math.random();
  }
  gC.setAttribute('position', new THREE.BufferAttribute(pos,3));
  const pts=new THREE.Points(gC, new THREE.PointsMaterial({
    size:.13, map:tc, transparent:true,
    blending:THREE.AdditiveBlending, depthWrite:false, color:cc
  }));

  // Ring
  const gR  =new THREE.BufferGeometry();
  const posR=new Float32Array(RING_N*3);
  const baseR=new Float32Array(RING_N*3);
  const rndR=new Float32Array(RING_N*3);
  for (let i=0;i<RING_N;i++) {
    const a=Math.random()*Math.PI*2;
    const u=Math.random();
    const rad=6.5+u*u*5.0;
    const px=Math.cos(a)*rad, pz=Math.sin(a)*rad;
    const py=(Math.random()-.5)*.07;
    baseR[i*3]  =px;
    baseR[i*3+1]=py-pz*Math.sin(RING_TILT)*.14;
    baseR[i*3+2]=pz*Math.cos(RING_TILT*.14);
    posR[i*3]  =(Math.random()-.5)*22;
    posR[i*3+1]=(Math.random()-.5)*10;
    posR[i*3+2]=(Math.random()-.5)*22;
    rndR[i*3]  =Math.random()*.16+.04;
    rndR[i*3+1]=Math.random()*Math.PI*2;
    rndR[i*3+2]=Math.random();
  }
  gR.setAttribute('position', new THREE.BufferAttribute(posR,3));
  const ring=new THREE.Points(gR, new THREE.PointsMaterial({
    size:.075, map:tr, transparent:true,
    blending:THREE.AdditiveBlending, depthWrite:false, color:cr
  }));

  return { pts, ring, gC, gR, pos, base, rnd, posR, baseR, rndR };
}

const gA = buildGlobe(CORE_N, tCore,  tRing,  0xfff5cc, 0xddeeff);
const gB = buildGlobe(CORE_N, tCoreB, tRingB, 0xffcce8, 0xffddf5);

// Cầu A ở bên trái, B ở bên phải — sẽ lerp theo globeDistCur
scene.add(gA.pts); scene.add(gA.ring);
scene.add(gB.pts); scene.add(gB.ring);
gB.pts.visible  = false;
gB.ring.visible = false;

// ═══════════════════════════════════════════
// THREAD — dây hạt chính
// ═══════════════════════════════════════════
const gThread  = new THREE.BufferGeometry();
const threadP  = new Float32Array(THREAD_N*3);
const threadR  = new Float32Array(THREAD_N*2);
for (let i=0;i<THREAD_N;i++) {
  const f=i/THREAD_N;
  threadP[i*3]=f*13; threadP[i*3+1]=0; threadP[i*3+2]=0;
  threadR[i*2]=Math.random()*Math.PI*2;
  threadR[i*2+1]=Math.random();
}
gThread.setAttribute('position', new THREE.BufferAttribute(threadP,3));
const pThread=new THREE.Points(gThread, new THREE.PointsMaterial({
  size:.065, map:tThread, transparent:true,
  blending:THREE.AdditiveBlending, depthWrite:false,
  color:0xffcc88, opacity:0
}));
scene.add(pThread);

// ═══════════════════════════════════════════
// STREAM — hạt chạy dọc dây như dòng điện
// ═══════════════════════════════════════════
const gStream  = new THREE.BufferGeometry();
const streamP  = new Float32Array(STREAM_N*3);
const streamT  = new Float32Array(STREAM_N); // 0..1 position along thread
const streamSpd= new Float32Array(STREAM_N);
for (let i=0;i<STREAM_N;i++) {
  streamT[i]   = Math.random();
  streamSpd[i] = .003 + Math.random()*.005;
}
gStream.setAttribute('position', new THREE.BufferAttribute(streamP,3));
const pStream=new THREE.Points(gStream, new THREE.PointsMaterial({
  size:.1, map:tStream, transparent:true,
  blending:THREE.AdditiveBlending, depthWrite:false,
  color:0xffffcc, opacity:0
}));
scene.add(pStream);

// ═══════════════════════════════════════════
// PHOTO CARDS
// ═══════════════════════════════════════════
const photoGroup = new THREE.Group();
scenePhotos.add(photoGroup);
const GOLDEN = Math.PI*(3-Math.sqrt(5));

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}
function makeCard(photo,idx,total){
  const W=300,H=225,PAD=14,FOOT=68;
  const cw=W+PAD*2,ch=H+PAD+FOOT;
  const cv=document.createElement('canvas');
  cv.width=cw;cv.height=ch;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='rgba(5,3,1,0.80)';
  roundRect(ctx,0,0,cw,ch,12);ctx.fill();
  ctx.strokeStyle='rgba(255,205,70,0.4)';ctx.lineWidth=1;
  roundRect(ctx,0,0,cw,ch,12);ctx.stroke();
  ctx.fillStyle='rgba(255,235,175,0.9)';
  ctx.font='17px Georgia';ctx.textAlign='center';
  ctx.fillText(photo.name||'',cw/2,H+PAD+30);
  ctx.fillStyle='rgba(255,185,60,0.4)';
  ctx.font='12px Georgia';
  ctx.fillText(photo.date||'',cw/2,H+PAD+52);
  const tex=new THREE.CanvasTexture(cv);
  const mat=new THREE.SpriteMaterial({
    map:tex,transparent:true,opacity:0,
    blending:THREE.NormalBlending,depthWrite:false,
    sizeAttenuation:true,depthTest:false
  });
  const sp=new THREE.Sprite(mat);
  sp.scale.set(3.0*cw/H,3.0,1);
  const ps=Math.acos(1-2*(idx+.5)/total);
  const ts=GOLDEN*idx;
  const rr=GLOBE_R+.5;
  sp.position.set(rr*Math.sin(ps)*Math.cos(ts),rr*Math.sin(ps)*Math.sin(ts),rr*Math.cos(ps));
  sp.userData={phase:Math.random()*Math.PI*2};
  photoGroup.add(sp);
  const img=new Image();img.crossOrigin='anonymous';
  img.onload=()=>{
    ctx.save();roundRect(ctx,PAD,PAD,W,H,7);ctx.clip();
    ctx.drawImage(img,PAD,PAD,W,H);ctx.restore();
    ctx.fillStyle='rgba(255,235,175,0.9)';
    ctx.font='17px Georgia';ctx.textAlign='center';
    ctx.fillText(photo.name||'',cw/2,H+PAD+30);
    ctx.fillStyle='rgba(255,185,60,0.4)';
    ctx.font='12px Georgia';
    ctx.fillText(photo.date||'',cw/2,H+PAD+52);
    tex.needsUpdate=true;
  };
  img.src=photo.url;
  return sp;
}
const sprites=PHOTOS.map((p,i)=>makeCard(p,i,PHOTOS.length));

// ═══════════════════════════════════════════
// HAND TRACKING
// ═══════════════════════════════════════════
const videoEl=document.getElementById('input_video');
let rotX=0,rotY=0,zoom=ZOOM_DEF,isHand=false,pinchDist=0.15;

const handsMP=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
handsMP.setOptions({maxNumHands:1,modelComplexity:1,minDetectionConfidence:0.6});
handsMP.onResults(res=>{
  const txt=document.getElementById('hud-txt');
  if (res.multiHandLandmarks?.length>0) {
    isHand=true;
    const lm=res.multiHandLandmarks[0];
    rotY=(lm[9].x-.5)*Math.PI*1.4;
    rotX=(lm[9].y-.5)*Math.PI*.85;
    pinchDist=Math.hypot(lm[4].x-lm[8].x,lm[4].y-lm[8].y);
    zoom=THREE.MathUtils.clamp(
      THREE.MathUtils.mapLinear(pinchDist,.05,.26,17,7.0),7.0,17
    );
    txt.textContent=zoom<ZOOM_REVEAL?'✦ Xoay tay để khám phá':'Nhíu ngón tay để zoom vào';
    publish({isHand:true,rotX,rotY,zoom,pinchDist});
  } else {
    isHand=false;
    rotX*=.96;rotY*=.96;
    zoom=THREE.MathUtils.lerp(zoom,ZOOM_DEF,.03);
    pinchDist=.15;
    txt.textContent='Đưa tay vào khung hình';
    publish({isHand:false,rotX:0,rotY:0,zoom:ZOOM_DEF,pinchDist:.15});
  }
});
new Camera(videoEl,{
  onFrame:async()=>await handsMP.send({image:videoEl}),
  width:640,height:480
}).start();
window.addEventListener('wheel',e=>{
  zoom=THREE.MathUtils.clamp(zoom+e.deltaY*.012,7.0,20);
},{passive:true});

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function osc(i,t,amp){
  return Math.sin(t*1.1+i*.00831)*amp+Math.cos(t*.73+i*.01543)*amp*.45;
}

// Catenary curve: đường cong võng giữa 2 điểm
function catenary(t, p0, p1, sag) {
  const x = THREE.MathUtils.lerp(p0.x, p1.x, t);
  const y = THREE.MathUtils.lerp(p0.y, p1.y, t) - Math.sin(t*Math.PI)*sag;
  const z = THREE.MathUtils.lerp(p0.z, p1.z, t);
  return {x,y,z};
}

// Update một globe
function tickGlobe(g, n, active, rx, ry, cx, t, seed) {
  const cp=g.gC.attributes.position.array;
  for (let i=0;i<n;i++) {
    const s=g.rnd[i*4],o1=g.rnd[i*4+1],o2=g.rnd[i*4+2];
    let tx,ty,tz;
    if (active) {
      const b=osc(i+seed,t,.065);
      tx=g.base[i*3]+b+cx;
      ty=g.base[i*3+1]+b*.7;
      tz=g.base[i*3+2]+b;
    } else {
      const r=9+Math.sin(t*s*.38+o2)*3;
      tx=Math.sin(t*s+o1)*r+cx;
      ty=Math.cos(t*s*.58+o2)*r*.68;
      tz=Math.sin(t*s*.82+o1+1.3)*r;
    }
    const ls=active?.020:.015;
    cp[i*3]+=(tx-cp[i*3])*ls;
    cp[i*3+1]+=(ty-cp[i*3+1])*ls;
    cp[i*3+2]+=(tz-cp[i*3+2])*ls;
  }
  g.gC.attributes.position.needsUpdate=true;
  g.pts.rotation.x=THREE.MathUtils.lerp(g.pts.rotation.x,rx,.04);
  g.pts.rotation.y=THREE.MathUtils.lerp(g.pts.rotation.y,ry,.04);
  g.pts.rotation.y+=.00085;
  g.ring.rotation.x=THREE.MathUtils.lerp(g.ring.rotation.x,rx+RING_TILT,.04);
  g.ring.rotation.y=THREE.MathUtils.lerp(g.ring.rotation.y,ry,.04);
  g.ring.rotation.y+=.00055;
  // Dịch chuyển cả group theo cx
  g.pts.position.x=THREE.MathUtils.lerp(g.pts.position.x,cx,.06);
  g.ring.position.x=THREE.MathUtils.lerp(g.ring.position.x,cx,.06);
}

// ═══════════════════════════════════════════
// ANIMATION
// ═══════════════════════════════════════════
let camTX=0, camTZ=ZOOM_DEF;
let bothHands=false;
let attraction=0; // 0..1 — kéo 2 cầu lại gần

function animate() {
  requestAnimationFrame(animate);
  const t=Date.now()*.00040;
  const connected=!!(other&&other.online);
  const oHand=connected&&other.isHand;
  const oRotX=oHand?(other.rotX||0):0;
  const oRotY=oHand?(other.rotY||0):0;
  const oPinch=connected?(other.pinchDist||.15):.15;

  // Hai cầu ở tâm đối xứng: A ở -d/2, B ở +d/2
  const halfD = globeDistCur * .5;
  const cxA   = connected ? -halfD : 0;
  const cxB   =  halfD;

  // Cầu A
  tickGlobe(gA, CORE_N, isHand, isHand?rotX:0, isHand?rotY:0, cxA, t, 0);

  // Cầu B
  if (connected) {
    gB.pts.visible=true; gB.ring.visible=true;
    tickGlobe(gB, CORE_N, oHand, oRotX, oRotY, cxB, t, 99999);
  } else {
    gB.pts.visible=false; gB.ring.visible=false;
  }

  // Attraction: cả 2 nhíu tay (pinch nhỏ) → kéo lại gần
  bothHands = isHand && oHand;
  const myPinch = pinchDist < .12;
  const theirPinch = oPinch < .12;
  const pulling = bothHands && myPinch && theirPinch;

  // target distance: kéo từ 13 → 7 khi cả 2 nhíu
  const targetDist = connected
    ? (pulling ? 7.5 : (bothHands ? 10.5 : 13.0))
    : 0;
  globeDistCur = THREE.MathUtils.lerp(globeDistCur, targetDist, .025);

  // Attraction factor 0..1 cho visual
  attraction = THREE.MathUtils.lerp(
    attraction,
    connected ? THREE.MathUtils.mapLinear(globeDistCur,13,7.5,0,1) : 0,
    .04
  );

  // Energy bar
  const ebar = document.getElementById('energy-bar');
  const efill= document.getElementById('energy-fill');
  if (bothHands && connected) {
    ebar.style.opacity='1';
    efill.style.width = (attraction*100)+'%';
  } else {
    ebar.style.opacity='0';
  }

  // ── THREAD & STREAM ──
  if (connected) {
    const p0={x:cxA,y:0,z:0};
    const p1={x:cxB,y:0,z:0};
    const sag = THREE.MathUtils.lerp(2.5, 0.3, attraction); // võng ít hơn khi gần
    const threadOpacity=THREE.MathUtils.lerp(.0,.75,
      THREE.MathUtils.clamp(THREE.MathUtils.mapLinear(globeDistCur,13,7.5,.3,1),0,1)
    );

    // Thread particles
    const tp=pThread.geometry.attributes.position.array;
    for (let i=0;i<THREAD_N;i++) {
      const f=i/THREAD_N;
      const ph=threadR[i*2];
      const c=catenary(f,p0,p1,sag);
      // Rung nhẹ perpendicular
      const wave=Math.sin(t*3+ph+f*Math.PI*6)*.12*(1-attraction*.5);
      tp[i*3]  =c.x;
      tp[i*3+1]=c.y+wave;
      tp[i*3+2]=c.z+Math.cos(t*2+ph)*.08;
    }
    pThread.geometry.attributes.position.needsUpdate=true;
    pThread.material.opacity=THREE.MathUtils.lerp(pThread.material.opacity,threadOpacity,.05);

    // Stream particles — chạy từ A → B và B → A
    const sp2=pStream.geometry.attributes.position.array;
    const streamOpacity=bothHands
      ? THREE.MathUtils.lerp(.4,.95,attraction)
      : 0;
    for (let i=0;i<STREAM_N;i++) {
      streamT[i]+=streamSpd[i]*(1+attraction*2); // nhanh hơn khi kéo
      if (streamT[i]>1) streamT[i]-=1;
      const f=streamT[i];
      const c=catenary(f,p0,p1,sag);
      sp2[i*3]  =c.x;
      sp2[i*3+1]=c.y;
      sp2[i*3+2]=c.z;
    }
    pStream.geometry.attributes.position.needsUpdate=true;
    pStream.material.opacity=THREE.MathUtils.lerp(pStream.material.opacity,streamOpacity,.05);
    pStream.material.size=THREE.MathUtils.lerp(pStream.material.size,.08+attraction*.08,.04);
  } else {
    pThread.material.opacity=THREE.MathUtils.lerp(pThread.material.opacity,0,.05);
    pStream.material.opacity=THREE.MathUtils.lerp(pStream.material.opacity,0,.05);
  }

  // photoGroup theo cầu A
  photoGroup.rotation.x=gA.pts.rotation.x;
  photoGroup.rotation.y=gA.pts.rotation.y;
  photoGroup.position.x=THREE.MathUtils.lerp(photoGroup.position.x,cxA,.06);

  // Camera — zoom ra khi connected để thấy cả 2
  const targetZ = connected
    ? Math.max(zoom+4, globeDistCur*1.1+8)
    : zoom;
  camera.position.z=THREE.MathUtils.lerp(camera.position.z,targetZ,.05);
  camera.position.x=THREE.MathUtils.lerp(camera.position.x, connected?0:0, .04);

  // Sprites
  const zf=THREE.MathUtils.clamp(
    THREE.MathUtils.mapLinear(zoom,ZOOM_REVEAL,ZOOM_SHOW,0,1),0,1
  );
  const baseOp=isHand?zf*zf*(3-2*zf)*.80:0;
  sprites.forEach(sp=>{
    if(!sp)return;
    const shimmer=baseOp>.05?Math.sin(t*.9+sp.userData.phase)*.055:0;
    sp.material.opacity=THREE.MathUtils.lerp(
      sp.material.opacity,
      THREE.MathUtils.clamp(baseOp+shimmer,0,1),.04
    );
    sp.material.needsUpdate=true;
  });

  // Bloom — thêm chút glow khi attraction cao
  const targetBloom=THREE.MathUtils.mapLinear(
    THREE.MathUtils.clamp(zoom,ZOOM_SHOW,ZOOM_DEF),ZOOM_SHOW,ZOOM_DEF,.6,2.6
  ) + attraction*.8;
  bloom.strength=THREE.MathUtils.lerp(bloom.strength,targetBloom,.04);

  if(isHand){
    const intro=document.getElementById('intro');
    if(intro)intro.style.opacity='0';
  }

  composer.render();
  renderer.autoClear=false;
  renderer.render(scenePhotos,camera);
  renderer.autoClear=true;
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  composer.setSize(innerWidth,innerHeight);
  bloom.resolution.set(innerWidth,innerHeight);
});

// Publish initial
publish({isHand:false,rotX:0,rotY:0,zoom:ZOOM_DEF,pinchDist:.15});
</script>
</body>
</html>
